  });

  html += '</div></div>';
  return html;
}

// Genereaza quiz cu AI
async function generateQuiz() {
  const cfg = state.quizConfig || {};
  const subjectKey = cfg.subject;
  const count = cfg.count || 10;
  const type = cfg.type || 'mixed';

  if (!subjectKey) {
    document.getElementById('quizGenStatus').textContent = '⚠️ Selectează o materie mai întâi';
    return;
  }

  const subject = SUBJECTS[subjectKey];
  const allPres = getAllPresentations(subjectKey);

  // Construim contextul din prezentari disponibile
  let context = '';
  if (allPres.length > 0) {
    allPres.forEach(function(pres) {
      context += '### ' + pres.title + '\n';
      pres.slides.forEach(function(slide) {
        context += '**' + slide.title + '**: ';
        // Strip HTML tags pentru context
        context += slide.content.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
        context += '\n\n';
      });
    });
  }

  if (!context) {
    document.getElementById('quizGenStatus').textContent = '⚠️ Nu există prezentări pentru ' + subject.name + '. Generează mai întâi o prezentare!';
    return;
  }

  const btn = document.getElementById('quizGenBtn');
  const statusEl = document.getElementById('quizGenStatus');
  btn.disabled = true;
  btn.innerHTML = '⏳ Se generează quiz-ul...';
  statusEl.textContent = 'Durează ~20-30 secunde...';

  // Prompt pentru tipul de intrebari
  let typeInstruction = '';
  if (type === 'grile') {
    typeInstruction = 'TOATE întrebările să fie cu 4 variante de răspuns (A, B, C, D). Exact UN singur răspuns corect.';
  } else if (type === 'adevarat') {
    typeInstruction = 'TOATE întrebările să fie de tip Adevărat/Fals. Opțiunile sunt ["Adevărat", "Fals"].';
  } else {
    typeInstruction = 'Mix: jumătate grile cu 4 variante, jumătate Adevărat/Fals.';
  }

  const systemPrompt = `Ești un profesor expert în ${subject.full}. Generezi întrebări de examen de calitate înaltă.

RĂSPUNDE STRICT cu un JSON array. FĂRĂ markdown, FĂRĂ backticks, FĂRĂ alt text.

Fiecare întrebare are structura:
{
  "q": "textul întrebării",
  "options": ["A. varianta 1", "B. varianta 2", "C. varianta 3", "D. varianta 4"],
  "correct": 0,
  "explanation": "explicație scurtă de ce este corect"
}

Unde "correct" este indexul (0-based) răspunsului corect din array-ul options.

REGULI:
- EXACT ${count} întrebări
- ${typeInstruction}
- Întrebările trebuie să fie relevante pentru materie și bazate pe conținut
- Dificultate variată: 30% ușoare, 50% medii, 20% dificile
- Explicații clare și educative
- În română
- DOAR JSON valid`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 6000,
        system: systemPrompt,
        messages: [{
          role: 'user',
          content: 'Generează ' + count + ' întrebări de examen bazate pe acest material:\n\n' + context.substring(0, 6000)
        }]
      })
    });

    const data = await response.json();

    if (data.content && data.content[0]) {
      let rawText = data.content[0].text.trim();
      rawText = rawText.replace(/^```json?\s*/, '').replace(/\s*```$/, '').trim();

      let questions = null;
      try {
        questions = JSON.parse(rawText);
        if (!Array.isArray(questions)) questions = null;
      } catch (e) {
        console.error('Quiz JSON parse error:', e);
      }

      if (questions && questions.length > 0) {
        // Seteaza quiz-ul activ
        state.activeQuiz = {
          subjectKey: subjectKey,
          questions: questions,
          currentIndex: 0,
          answers: [],
          startedAt: Date.now()
        };
        saveState();

        const zone = document.getElementById('quizActiveZone');
        if (zone) zone.innerHTML = renderActiveQuiz();
        statusEl.textContent = '';
      } else {
        statusEl.textContent = '⚠️ Eroare la parsarea întrebărilor. Încearcă din nou.';
      }
    } else if (data.error) {
      statusEl.textContent = '⚠️ Eroare API: ' + data.error.message;
    }
  } catch (err) {
    statusEl.textContent = '⚠️ Eroare conexiune: ' + err.message;
  }

  btn.disabled = false;
  btn.innerHTML = '<span>🧠</span> Generează Quiz';
}

// Randeaza quiz-ul activ (grile interactive)
function renderActiveQuiz() {
  const quiz = state.activeQuiz;
  if (!quiz) return '';

  const { questions, currentIndex, answers } = quiz;
  const total = questions.length;
  const isDone = currentIndex >= total;

  if (isDone) {
    // Calculam scorul
    const score = answers.filter(function(a, i) {
      return a === questions[i].correct;
    }).length;

    // Salvam in istoric
    if (!state.quizHistory) state.quizHistory = {};
    if (!state.quizHistory[quiz.subjectKey]) state.quizHistory[quiz.subjectKey] = [];
    state.quizHistory[quiz.subjectKey].push({
      score: score,
      total: total,
      count: total,
      timestamp: Date.now()
    });
    state.activeQuiz = null;
    saveState();

    const pct = Math.round((score / total) * 100);
    const color = pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--amber)' : 'var(--red)';
    const emoji = pct >= 80 ? '🎉' : pct >= 60 ? '👍' : '📚';
    const msg = pct >= 80 ? 'Excelent! Ești pregătit!' : pct >= 60 ? 'Bun! Mai exersează puțin.' : 'Continuă să studiezi — poți!';

    let html = '<div class="quiz-score-card" style="margin-top:20px;">';
    html += '<div style="font-size:3rem;margin-bottom:12px;">' + emoji + '</div>';
    html += '<div class="quiz-score-num" style="color:' + color + '">' + pct + '%</div>';
    html += '<div class="quiz-score-label">' + score + ' din ' + total + ' corecte</div>';
    html += '<p style="color:var(--text-secondary);margin-bottom:24px;">' + msg + '</p>';

    // Recapitulare
    html += '<div style="text-align:left;margin-bottom:24px;">';
    questions.forEach(function(q, i) {
      const userAnswer = answers[i];
      const isCorrect = userAnswer === q.correct;
      html += '<div style="padding:12px;border-radius:var(--radius-sm);margin-bottom:8px;background:' + (isCorrect ? 'var(--green-muted)' : 'var(--red-muted)') + ';border:1px solid ' + (isCorrect ? 'var(--green)' : 'var(--red)') + ';">';
      html += '<div style="font-size:.82rem;font-weight:700;color:' + (isCorrect ? 'var(--green)' : 'var(--red)') + '">' + (isCorrect ? '✓ Corect' : '✗ Greșit') + ' — Întrebarea ' + (i + 1) + '</div>';
      html += '<div style="font-size:.88rem;margin-top:4px;">' + q.q + '</div>';
      if (!isCorrect) {
        html += '<div style="font-size:.8rem;color:var(--text-secondary);margin-top:4px;">Răspuns corect: ' + (q.options[q.correct] || 'Adevărat') + '</div>';
      }
      html += '</div>';
    });
    html += '</div>';

    html += '<button class="quiz-nav-btn primary" onclick="navigateTo(\'quiz\')">Nou Quiz</button>';
    html += '</div>';
    return html;
  }

  // Intrebarea curenta
  const q = questions[currentIndex];
  const hasAnswered = answers[currentIndex] !== undefined;
  const userAnswer = answers[currentIndex];
  const progress = Math.round((currentIndex / total) * 100);

  let html = '<div class="quiz-container" style="margin-top:20px;">';
  html += '<div class="quiz-header">';
  html += '<span style="font-size:.88rem;font-weight:600;">Întrebarea ' + (currentIndex + 1) + ' din ' + total + '</span>';
  html += '<button class="quiz-nav-btn" style="font-size:.78rem;" onclick="abandonQuiz()">✕ Abandonează</button>';
  html += '</div>';

  html += '<div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:' + progress + '%"></div></div>';

  html += '<div class="quiz-question-card">';
  html += '<div class="quiz-q-num">' + SUBJECTS[quiz.subjectKey].icon + ' ' + SUBJECTS[quiz.subjectKey].name + '</div>';
  html += '<div class="quiz-q-text">' + escapeHtml(q.q) + '</div>';

  html += '<div class="quiz-options">';
  const letters = ['A', 'B', 'C', 'D'];
  q.options.forEach(function(option, optIndex) {
    let className = 'quiz-option';
    if (hasAnswered) {
      if (optIndex === q.correct) className += ' correct';
      else if (optIndex === userAnswer) className += ' wrong';
    }
    const disabled = hasAnswered ? 'disabled' : '';
    html += '<button class="' + className + '" ' + disabled + ' onclick="answerQuizQuestion(' + optIndex + ')">';
    html += '<span class="quiz-option-letter">' + letters[optIndex] + '</span>';
    html += '<span>' + escapeHtml(option) + '</span>';
    html += '</button>';
  });
  html += '</div>';

  // Explicatie (arata dupa raspuns)
  if (hasAnswered && q.explanation) {
    html += '<div class="quiz-explanation show">💡 ' + escapeHtml(q.explanation) + '</div>';
  }

  html += '</div>'; // end quiz-question-card

  // Navigare
  html += '<div class="quiz-nav-btns">';
  if (currentIndex > 0) {
    html += '<button class="quiz-nav-btn" onclick="prevQuizQuestion()">← Prev</button>';
  } else {
    html += '<div></div>';
  }

  if (hasAnswered) {
    const isLast = currentIndex === total - 1;
    if (isLast) {
      html += '<button class="quiz-nav-btn primary" onclick="nextQuizQuestion()">Finalizează 🏁</button>';
    } else {
      html += '<button class="quiz-nav-btn primary" onclick="nextQuizQuestion()">Următor →</button>';
    }
  } else {
    html += '<span style="font-size:.82rem;color:var(--text-muted)">Selectează un răspuns</span>';
  }

  html += '</div>';
  html += '</div>'; // end quiz-container
  return html;
}

// Raspunde la intrebare
function answerQuizQuestion(optionIndex) {
  if (!state.activeQuiz) return;
  const { currentIndex } = state.activeQuiz;
  if (state.activeQuiz.answers[currentIndex] !== undefined) return; // deja raspuns

  state.activeQuiz.answers[currentIndex] = optionIndex;
  saveState();

  const zone = document.getElementById('quizActiveZone');
  if (zone) zone.innerHTML = renderActiveQuiz();
}

// Urmator
function nextQuizQuestion() {
  if (!state.activeQuiz) return;
  state.activeQuiz.currentIndex++;
  saveState();
  const zone = document.getElementById('quizActiveZone');
  if (zone) zone.innerHTML = renderActiveQuiz();
}

// Precedent
function prevQuizQuestion() {
  if (!state.activeQuiz) return;
  if (state.activeQuiz.currentIndex > 0) {
    state.activeQuiz.currentIndex--;
    saveState();
    const zone = document.getElementById('quizActiveZone');
    if (zone) zone.innerHTML = renderActiveQuiz();
  }
}

function abandonQuiz() {
  if (!confirm('Sigur vrei să abandonezi quiz-ul? Progresul se va pierde.')) return;
  state.activeQuiz = null;
  saveState();
  navigateTo('quiz');
}

// Calcula intervalul urmator bazat pe rating Easy/Hard
// Easy → interval * 2.5, Hard → interval / 2 (min 1 zi)
function calculateNextReview(card, rating) {
  const now = Date.now();
  const DAY_MS = 24 * 60 * 60 * 1000;

  if (rating === 'easy') {
    const interval = (card.interval || 1) * 2.5;
    card.interval = Math.round(interval);
    card.ease = Math.min((card.ease || 2.5) + 0.1, 3.0);
    card.nextReview = now + card.interval * DAY_MS;
    card.streak = (card.streak || 0) + 1;
  } else if (rating === 'hard') {
    card.interval = Math.max(1, Math.round((card.interval || 1) / 2));
    card.ease = Math.max((card.ease || 2.5) - 0.2, 1.3);
    card.nextReview = now + card.interval * DAY_MS;
    card.streak = 0;
  }

  card.lastReviewed = now;
  card.reviews = (card.reviews || 0) + 1;
  return card;
}

// Statistici globale flashcards
function renderAllFCStats() {
  const decks = state.flashcardDecks || {};
  const now = Date.now();

  let totalCards = 0;
  let dueCards = 0;
  let masteredCards = 0;

  for (const [key, cards] of Object.entries(decks)) {
    cards.forEach(function(card) {
      totalCards++;
      if (!card.nextReview || card.nextReview <= now) dueCards++;
      if ((card.streak || 0) >= 5) masteredCards++;
    });
  }

  if (!totalCards) {
    return '<div style="text-align:center;padding:40px;color:var(--text-muted);">Selectează o materie și generează flashcard-uri pentru a începe 🃏</div>';
  }

  let html = '<div class="flashcard-stats" style="margin-top:20px;">';
  html += '<div class="fc-stat"><div class="fc-stat-val">' + totalCards + '</div><div class="fc-stat-label">Total Cards</div></div>';
  html += '<div class="fc-stat"><div class="fc-stat-val" style="color:var(--amber)">' + dueCards + '</div><div class="fc-stat-label">De Revizuit</div></div>';
  html += '<div class="fc-stat"><div class="fc-stat-val" style="color:var(--green)">' + masteredCards + '</div><div class="fc-stat-label">Memorate</div></div>';
  html += '</div>';
  html += '<div style="text-align:center;color:var(--text-muted);font-size:.88rem;">Selectează o materie pentru a studia flashcard-urile.</div>';
  return html;
}

// Randeaza studiul de flashcards pentru o materie
function renderFlashcardStudy(key) {
  const decks = state.flashcardDecks || {};
  const allCards = decks[key] || [];
  const subject = SUBJECTS[key];
  const now = Date.now();

  // Filtram cardurile scadente (due)
  const dueCards = allCards.filter(function(card) {
    return !card.nextReview || card.nextReview <= now;
  });

  const totalCards = allCards.length;
  const masteredCards = allCards.filter(function(c) { return (c.streak || 0) >= 5; }).length;

  let html = '<div style="margin-top:20px;">';

  html += '<div class="flashcard-stats">';

  html += '<div class="fc-stat"><div class="fc-stat-val" style="color:var(--amber)">' + dueCards.length + '</div><div class="fc-stat-label">De Revizuit</div></div>';
  html += '<div class="fc-stat"><div class="fc-stat-val" style="color:var(--green)">' + masteredCards + '</div><div class="fc-stat-label">Memorate</div></div>';

    html += '</div>';

  html += '<div class="fc-queue-info">' + Math.max(0, remaining) + ' carduri rămase din ' + dueCards.length + ' scadente</div>';

  html += '<div class="flashcard-scene" onclick="flipFlashcard()">';
  html += '<div class="flashcard-inner ' + (isFlipped ? 'flipped' : '') + '" id="fcInner">';

  html += '</div>';

  html += '</div>';

// Rastoarnă flashcard-ul
function flipFlashcard() {
  state.fcFlipped = !state.fcFlipped;
  const inner = document.getElementById('fcInner');
  if (inner) {
    inner.classList.toggle('flipped', state.fcFlipped);
  }
  // Re-render pentru a arata butoanele dupa flip
  const zone = document.getElementById('fcStudyZone');
  if (zone && state.fcActiveSubject) {
    zone.innerHTML = renderFlashcardStudy(state.fcActiveSubject);
  }
}

// Evalueaza cardul (Easy/Hard)
function rateFlashcard(key, cardIndex, rating) {
  const decks = state.flashcardDecks || {};
  const allCards = decks[key] || [];
  const now = Date.now();

  // Gasim cardul in deck-ul principal
  const dueCards = allCards.filter(function(card) {
    return !card.nextReview || card.nextReview <= now;
  });

  if (cardIndex >= dueCards.length) return;

  const card = dueCards[cardIndex];
  // Updatam in deck-ul principal
  const mainIndex = allCards.findIndex(function(c) { return c.id === card.id; });
  if (mainIndex >= 0) {
    allCards[mainIndex] = calculateNextReview(allCards[mainIndex], rating);
  }

  state.flashcardDecks[key] = allCards;
  state.fcCurrentCard = (state.fcCurrentCard || 0) + 1;
  state.fcFlipped = false;
  saveState();

  // Re-render
  const zone = document.getElementById('fcStudyZone');
  if (zone) zone.innerHTML = renderFlashcardStudy(key);
  renderSidebar();
}

// Skip card (trece la urmatorul)
function skipFlashcard() {
  state.fcCurrentCard = (state.fcCurrentCard || 0) + 1;
  state.fcFlipped = false;
  const zone = document.getElementById('fcStudyZone');
  if (zone && state.fcActiveSubject) {
    zone.innerHTML = renderFlashcardStudy(state.fcActiveSubject);
  }
}

// Studiaza toate cardurile (nu doar cele scadente)
function studyAllCardsNow(key) {
  const decks = state.flashcardDecks || {};

  allCards.forEach(function(card) {
    card.nextReview = Date.now() - 1;

  state.fcCurrentCard = 0;
  state.fcFlipped = false;
  saveState();
  const zone = document.getElementById('fcStudyZone');
  if (zone) zone.innerHTML = renderFlashcardStudy(key);
}

// Genereaza flashcard-uri cu AI
async function generateFlashcards() {
  const key = state.fcActiveSubject;
  if (!key) {
    document.getElementById('fcGenStatus').textContent = '⚠️ Selectează o materie mai întâi';
    return;
  }

  const subject = SUBJECTS[key];
  const allPres = getAllPresentations(key);

  if (!allPres.length) {
    document.getElementById('fcGenStatus').textContent = '⚠️ Nu există prezentări pentru ' + subject.name + '. Generează mai întâi o prezentare!';
    return;
  }

  // Construim contextul din prezentari
  let context = '';
  allPres.forEach(function(pres) {
    context += '### ' + pres.title + '\n';
    pres.slides.forEach(function(slide) {
      context += slide.title + ': ';
      context += slide.content.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
      context += '\n\n';
    });
  });

  const btn = document.getElementById('fcGenBtn');
  const statusEl = document.getElementById('fcGenStatus');
  btn.disabled = true;
  btn.innerHTML = '⏳ Se generează...';
  statusEl.textContent = 'Durează ~15-25 secunde...';

  const systemPrompt = `Ești un expert în ${subject.full}. Generezi flashcard-uri pentru memorare eficientă.

RĂSPUNDE STRICT cu un JSON array. FĂRĂ markdown, FĂRĂ backticks, FĂRĂ alt text.

Fiecare flashcard are structura:
{
  "front": "întrebarea sau conceptul",
  "back": "răspunsul complet și clar"
}

REGULI:
- EXACT 20 flashcard-uri
- Front: întrebare directă sau concept de definit
- Back: răspuns concis, clar, memorable (max 60 cuvinte)
- Acoperă toate conceptele cheie din material
- Variație: definiții, formule, exemple, comparații
- În română
- DOAR JSON valid`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        system: systemPrompt,
        messages: [{
          role: 'user',
          content: 'Generează 20 flashcard-uri din:\n\n' + context.substring(0, 6000)
        }]
      })
    });

    const data = await response.json();

    if (data.content && data.content[0]) {
      let rawText = data.content[0].text.trim();
      rawText = rawText.replace(/^```json?\s*/, '').replace(/\s*```$/, '').trim();

      let cards = null;
      try {
        cards = JSON.parse(rawText);
        if (!Array.isArray(cards)) cards = null;
      } catch (e) {
        console.error('FC JSON parse error:', e);
      }

      if (cards && cards.length > 0) {
        // Adaugam ID unic si metadate spaced repetition fiecarui card
        const newCards = cards.map(function(card, i) {
          return {
            id: 'fc_' + Date.now() + '_' + i,
            front: card.front,
            back: card.back,
            interval: 1,         // interval initial: 1 zi
            ease: 2.5,           // ease factor initial
            streak: 0,           // zile consecutive corecte
            reviews: 0,          // numar total de reviews
            nextReview: null,    // null = scadent acum
            lastReviewed: null
          };
        });

        if (!state.flashcardDecks) state.flashcardDecks = {};
        // Adaugam la deck-ul existent (nu inlocuim)
        const existing = state.flashcardDecks[key] || [];
        state.flashcardDecks[key] = [...existing, ...newCards];
        state.fcCurrentCard = 0;
        state.fcFlipped = false;
        saveState();

        statusEl.textContent = '✅ ' + newCards.length + ' flashcard-uri adăugate!';
        const zone = document.getElementById('fcStudyZone');
        if (zone) zone.innerHTML = renderFlashcardStudy(key);
        renderSidebar();
      } else {
        statusEl.textContent = '⚠️ Eroare la parsare. Încearcă din nou.';
      }
    } else if (data.error) {
      statusEl.textContent = '⚠️ Eroare API: ' + data.error.message;
    }
  } catch (err) {
    statusEl.textContent = '⚠️ Eroare conexiune: ' + err.message;
  }

  btn.disabled = false;
  btn.innerHTML = '<span>✨</span> Generează Flashcard-uri AI';
}

// Starea calendarului mini
let calendarState = {
  year: new Date().getFullYear(),
  month: new Date().getMonth()

// Randeaza pagina Calendar
function renderCalendarPage(element) {
  let html = '<div class="anim">';
  html += '<div class="dash-hero" style="padding:32px 20px 24px">';
  html += '<h2>📅 Calendar Sesiune</h2>';
  html += '<p>Countdown la examene și planificator de studiu</p>';
  html += '</div>';

  // Countdown cards pentru examene
  const exams = state.exams || [];
  const now = new Date();
  now.setHours(0, 0, 0, 0);

  if (exams.length > 0) {
    html += '<div class="exam-countdown-grid anim-d1">';
    exams.sort(function(a, b) { return new Date(a.date) - new Date(b.date); });

    exams.forEach(function(exam, index) {
      const examDate = new Date(exam.date);
      examDate.setHours(0, 0, 0, 0);
      const diffMs = examDate - now;
      const diffDays = Math.round(diffMs / (1000 * 60 * 60 * 24));

      let urgency = 'ok';
      if (diffDays < 0) urgency = 'past';
      else if (diffDays <= 3) urgency = 'urgent';
      else if (diffDays <= 7) urgency = 'soon';

      const subject = SUBJECTS[exam.subject];

      html += '<div class="exam-countdown-card ' + urgency + '">';
      html += '<button class="ecc-del" onclick="deleteExam(' + index + ')">✕</button>';
      html += '<div class="ecc-subject">' + (subject ? subject.icon + ' ' + subject.name : exam.subject) + '</div>';
      html += '<div class="ecc-name">' + escapeHtml(exam.name) + '</div>';

      if (diffDays < 0) {
        html += '<div class="ecc-days" style="color:var(--text-muted)">-</div>';
        html += '<div class="ecc-days-label">Trecut</div>';
      } else if (diffDays === 0) {
        html += '<div class="ecc-days" style="color:var(--red)">AZI</div>';
        html += '<div class="ecc-days-label">Mult succes! 💪</div>';
      } else {
        html += '<div class="ecc-days">' + diffDays + '</div>';
        html += '<div class="ecc-days-label">' + (diffDays === 1 ? 'zi rămase' : 'zile rămase') + '</div>';
      }

      html += '<div class="ecc-date">📅 ' + examDate.toLocaleDateString('ro', { weekday: 'long', day: 'numeric', month: 'long' }) + '</div>';

      if (exam.room) {
        html += '<div class="ecc-date" style="margin-top:4px;">🏛️ ' + escapeHtml(exam.room) + '</div>';
      }
      html += '</div>';
    });

    html += '</div>';
  }

  // Form adaugare examen + calendar mini
  html += '<div class="calendar-layout anim-d2">';

  // Stanga: form + plan
  html += '<div>';

  html += '<div class="add-exam-form">';
  html += '<h3>➕ Adaugă Examen</h3>';
  html += '<div class="exam-form-row">';
  html += '<input class="todo-inp" id="examName" placeholder="Ex: Examen parțial MAP" style="width:100%;">';
  html += '<select class="todo-inp" id="examSubject" style="width:100%;">';
  html += '<option value="">— Materie —</option>';
  for (const [key, subject] of Object.entries(SUBJECTS)) {
    html += '<option value="' + key + '">' + subject.icon + ' ' + subject.name + '</option>';
  }
  html += '</select>';
  html += '<button class="todo-btn" onclick="addExam()">+</button>';
  html += '</div>';
  html += '<div class="exam-form-row" style="grid-template-columns:1fr 1fr;margin-top:10px;">';
  html += '<input class="todo-inp" type="date" id="examDate" value="' + new Date().toISOString().split('T')[0] + '" style="width:100%;">';
  html += '<input class="todo-inp" id="examRoom" placeholder="Sala (opțional)" style="width:100%;">';
  html += '</div>';
  html += '</div>'; // end add-exam-form

  // Plan de studiu auto-generat
  html += '<div class="study-plan-section">';
  html += '<h3>📋 Plan Auto de Studiu</h3>';

  if (exams.length === 0) {
    html += '<div style="color:var(--text-muted);font-size:.85rem;text-align:center;padding:16px;">Adaugă examene pentru a genera un plan de studiu</div>';
  } else {
    // Generam plan pentru urmatoarele 14 zile
    const plan = generateStudyPlan(exams, 14);
    if (plan.length === 0) {
      html += '<div style="color:var(--text-muted);font-size:.85rem;text-align:center;padding:16px;">Nu există examene viitoare în următoarele 14 zile</div>';
    } else {
      plan.forEach(function(day) {
        const dayDate = new Date(day.date);
        const isToday = dayDate.toDateString() === new Date().toDateString();
        html += '<div class="study-day-row">';
        html += '<div class="sdr-date" style="' + (isToday ? 'color:var(--accent);font-weight:700;' : '') + '">';
        html += dayDate.toLocaleDateString('ro', { weekday: 'short', day: 'numeric', month: 'short' });
        html += (isToday ? ' 📌' : '');
        html += '</div>';
        html += '<div class="sdr-subject">';
        html += day.tasks.map(function(task) {
          const subj = SUBJECTS[task.subject];
          return (subj ? subj.icon + ' ' + subj.name : task.subject) + ' — ' + task.activity;
        }).join(' · ');
        html += '</div>';
        html += '<div class="sdr-hours">⏱ ' + day.hours + 'h</div>';
        html += '</div>';
      });
    }
  }

  html += '</div>'; // end study-plan-section
  html += '</div>'; // end stanga

  // Dreapta: calendar mini
  html += '<div>';
  html += '<div class="calendar-mini">';
  html += renderMiniCalendar(exams);
  html += '</div>';
  html += '</div>';

  html += '</div>'; // end calendar-layout
  html += '</div>'; // end anim
  element.innerHTML = html;
}

// Genereaza plan de studiu automat bazat pe examene
function generateStudyPlan(exams, daysAhead) {
  const plan = [];
  const now = new Date();
  now.setHours(0, 0, 0, 0);

  // Activitati recomandate
  const activities = ['Recitire prezentări', 'Rezolvare exerciții', 'Flashcards', 'Quiz AI', 'Notițe rezumative', 'Recapitulare finală'];

  for (let d = 0; d < daysAhead; d++) {
    const date = new Date(now);
    date.setDate(date.getDate() + d);

    const tasks = [];
    let hours = 0;

    // Sortam examenele dupa distanta de la ziua curenta
    const upcoming = exams
      .filter(function(e) {
        const ed = new Date(e.date);
        ed.setHours(0, 0, 0, 0);
        return ed >= date;
      })
      .sort(function(a, b) {
        return new Date(a.date) - new Date(b.date);
      });

    if (upcoming.length === 0) continue;

    // Prioritizeaza examenele cele mai apropiate
    upcoming.slice(0, 2).forEach(function(exam, i) {
      const examDate = new Date(exam.date);
      examDate.setHours(0, 0, 0, 0);
      const daysLeft = Math.round((examDate - date) / (1000 * 60 * 60 * 24));

      if (daysLeft < 0) return;

      let activityIndex = 0;
      if (daysLeft === 0) activityIndex = 5; // Recapitulare finala
      else if (daysLeft <= 2) activityIndex = 4; // Notite rezumative
      else if (daysLeft <= 5) activityIndex = Math.floor(Math.random() * 2) + 2; // Flashcards sau Quiz
      else activityIndex = Math.floor(Math.random() * 2); // Recitire sau Exercitii

      tasks.push({
        subject: exam.subject,
        activity: activities[activityIndex],
        priority: i === 0 ? 'high' : 'normal'
      });

      hours += daysLeft <= 3 ? 3 : daysLeft <= 7 ? 2 : 1;
    });

    if (tasks.length > 0) {
      plan.push({
        date: date.toISOString().split('T')[0],
        tasks: tasks,
        hours: Math.min(hours, 6)
      });
    }
  }

  return plan;
}

// Randeaza calendarul mini
function renderMiniCalendar(exams) {
  const year = calendarState.year;
  const month = calendarState.month;

  const monthNames = ['Ianuarie', 'Februarie', 'Martie', 'Aprilie', 'Mai', 'Iunie',
    'Iulie', 'August', 'Septembrie', 'Octombrie', 'Noiembrie', 'Decembrie'];
  const dayNames = ['Lu', 'Ma', 'Mi', 'Jo', 'Vi', 'Sâ', 'Du'];

  // Construim set de date cu examene
  const examDates = new Set();
  (exams || []).forEach(function(exam) {
    examDates.add(exam.date);
  });

  const today = new Date();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  let startDow = firstDay.getDay() - 1; // Luni = 0
  if (startDow < 0) startDow = 6;

  let html = '<div class="calendar-mini-header">';
  html += '<button class="cal-nav-btn" onclick="prevCalMonth()">←</button>';
  html += '<div class="calendar-mini-title">' + monthNames[month] + ' ' + year + '</div>';
  html += '<button class="cal-nav-btn" onclick="nextCalMonth()">→</button>';
  html += '</div>';

  html += '<div class="calendar-grid">';

  // Header zile
  dayNames.forEach(function(d) {
    html += '<div class="cal-day-header">' + d + '</div>';
  });

  // Padding zile goale
  for (let i = 0; i < startDow; i++) {
    html += '<div class="cal-day empty"></div>';
  }

  // Zilele lunii
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    const isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
    const hasExam = examDates.has(dateStr);

    let classes = 'cal-day';
    if (isToday) classes += ' today';
    if (hasExam) classes += ' has-exam';

    html += '<div class="' + classes + '">' + d;
    if (hasExam) html += '<div class="cal-exam-dot"></div>';
    html += '</div>';
  }

  html += '</div>'; // end calendar-grid

  // Legenda
  html += '<div style="margin-top:14px;font-size:.72rem;color:var(--text-muted);display:flex;gap:14px;justify-content:center;">';
  html += '<span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--accent);margin-right:4px;"></span>Azi</span>';
  html += '<span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--red);margin-right:4px;"></span>Examen</span>';
  html += '</div>';

  return html;
}

// Navigare calendar
function prevCalMonth() {
  calendarState.month--;
  if (calendarState.month < 0) {
    calendarState.month = 11;
    calendarState.year--;
  }
  const calEl = document.querySelector('.calendar-mini');
  if (calEl) calEl.innerHTML = renderMiniCalendar(state.exams || []);
}

function nextCalMonth() {
  calendarState.month++;
  if (calendarState.month > 11) {
    calendarState.month = 0;
    calendarState.year++;
  }
  const calEl = document.querySelector('.calendar-mini');
  if (calEl) calEl.innerHTML = renderMiniCalendar(state.exams || []);
}

// Adauga examen
function addExam() {
  const nameInput = document.getElementById('examName');
  const subjectSelect = document.getElementById('examSubject');
  const dateInput = document.getElementById('examDate');
  const roomInput = document.getElementById('examRoom');

  const name = nameInput.value.trim();
  const subject = subjectSelect.value;
  const date = dateInput.value;

  if (!name || !subject || !date) {
    alert('Completează cel puțin numele, materia și data examenului!');
    return;
  }

  if (!state.exams) state.exams = [];
  state.exams.push({
    name: name,
    subject: subject,
    date: date,
    room: roomInput ? roomInput.value.trim() : '',
    addedAt: Date.now()
  });

  saveState();

  nameInput.value = '';
  roomInput.value = '';

  renderCalendarPage(document.getElementById('pageContent'));
  renderSidebar();
}

// Sterge examen
function deleteExam(index) {
  if (!confirm('Ștergi examenul?')) return;
  state.exams.splice(index, 1);
  saveState();
  renderCalendarPage(document.getElementById('pageContent'));
  renderSidebar();
}
