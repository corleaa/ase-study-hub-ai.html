<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASE Study Hub — AI-Powered</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Newsreader:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ========== THEME SYSTEM ========== */
:root {
  --bg-base: #0b0d11;
  --bg-raised: #12151c;
  --bg-surface: #181c26;
  --bg-overlay: #1e2330;
  --bg-input: #141720;
  --text-primary: #e4e6ed;
  --text-secondary: #8b90a0;
  --text-muted: #555a6b;
  --accent: #7b68ee;
  --accent-hover: #9183f5;
  --accent-muted: rgba(123,104,238,0.12);
  --accent-border: rgba(123,104,238,0.25);
  --green: #3dd68c;
  --green-muted: rgba(61,214,140,0.12);
  --amber: #f0b45b;
  --amber-muted: rgba(240,180,91,0.12);
  --red: #f06272;
  --red-muted: rgba(240,98,114,0.12);
  --blue: #5ba8f0;
  --blue-muted: rgba(91,168,240,0.12);
  --border: rgba(255,255,255,0.05);
  --border-hover: rgba(255,255,255,0.1);
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --radius: 14px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --ease: cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"] {
  --bg-base: #f4f2ee;
  --bg-raised: #ffffff;
  --bg-surface: #f0ede7;
  --bg-overlay: #e8e4dc;
  --bg-input: #f7f5f1;
  --text-primary: #1a1a28;
  --text-secondary: #5c5c72;
  --text-muted: #9494a8;
  --accent: #6554d4;
  --accent-hover: #7b6aef;
  --accent-muted: rgba(101,84,212,0.07);
  --accent-border: rgba(101,84,212,0.2);
  --green: #1fa86a;
  --green-muted: rgba(31,168,106,0.08);
  --amber: #c78d2e;
  --amber-muted: rgba(199,141,46,0.08);
  --red: #d4465a;
  --red-muted: rgba(212,70,90,0.08);
  --blue: #3b7fd4;
  --blue-muted: rgba(59,127,212,0.08);
  --border: rgba(0,0,0,0.06);
  --border-hover: rgba(0,0,0,0.12);
  --shadow: 0 8px 32px rgba(0,0,0,0.06);
}

/* ========== RESET & BASE ========== */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg-base);
  color:var(--text-primary);
  min-height:100vh;
  transition:background .35s var(--ease),color .35s var(--ease);
  overflow-x:hidden;
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:3px}
button{cursor:pointer;font-family:inherit;}
input,textarea,select{font-family:inherit;}

/* ========== LOCK SCREEN ========== */
.lock-screen{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg-base);
  display:flex;align-items:center;justify-content:center;
  transition:opacity .5s,transform .5s;
}
.lock-screen.hidden{opacity:0;pointer-events:none;transform:scale(1.05);}
.lock-box{
  text-align:center;width:340px;
  animation:lockIn .6s var(--ease) both;
}
@keyframes lockIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
.lock-logo{
  font-size:3rem;margin-bottom:8px;
}
.lock-title{
  font-family:'Newsreader',serif;font-size:1.8rem;font-weight:800;margin-bottom:4px;
}
.lock-sub{color:var(--text-secondary);font-size:.9rem;margin-bottom:28px;}
.lock-input{
  width:100%;padding:14px 18px;background:var(--bg-surface);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text-primary);font-size:1rem;text-align:center;
  letter-spacing:4px;transition:border-color .2s;
}
.lock-input:focus{outline:none;border-color:var(--accent);}
.lock-input::placeholder{letter-spacing:0;color:var(--text-muted);}
.lock-btn{
  margin-top:14px;width:100%;padding:13px;background:var(--accent);
  color:#fff;border:none;border-radius:var(--radius-sm);font-weight:600;
  font-size:.95rem;transition:background .2s;
}
.lock-btn:hover{background:var(--accent-hover);}
.lock-hint{font-size:.75rem;color:var(--text-muted);margin-top:14px;}
.lock-error{color:var(--red);font-size:.82rem;margin-top:8px;display:none;}

/* ========== LAYOUT ========== */
.app{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{
  width:260px;background:var(--bg-raised);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;left:0;top:0;bottom:0;z-index:50;
  transition:transform .35s var(--ease);
}
.sidebar-brand{
  padding:24px 20px 20px;border-bottom:1px solid var(--border);
}
.sidebar-brand h1{
  font-family:'Newsreader',serif;font-size:1.25rem;font-weight:800;
  display:flex;align-items:center;gap:10px;
}
.sidebar-brand h1 span{
  background:linear-gradient(135deg,var(--accent),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto;}
.nav-section{
  font-size:.7rem;font-weight:700;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:1.5px;
  padding:12px 10px 6px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:var(--radius-sm);
  background:transparent;border:none;width:100%;text-align:left;
  color:var(--text-secondary);font-size:.88rem;font-weight:500;
  transition:all .2s;
}
.nav-item:hover{background:var(--bg-surface);color:var(--text-primary);}
.nav-item.active{background:var(--accent-muted);color:var(--accent);}
.nav-item .ni-icon{font-size:1.15rem;width:24px;text-align:center;}
.nav-item .ni-badge{
  margin-left:auto;font-size:.7rem;font-weight:700;
  padding:2px 7px;border-radius:10px;
  background:var(--accent-muted);color:var(--accent);
}
.sidebar-footer{
  padding:14px 16px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.theme-btn{
  padding:8px 12px;border-radius:var(--radius-xs);
  background:var(--bg-surface);border:1px solid var(--border);
  color:var(--text-secondary);font-size:.82rem;font-weight:500;
  transition:all .2s;flex:1;
}
.theme-btn:hover{border-color:var(--accent-border);color:var(--text-primary);}
.logout-btn{
  padding:8px 12px;border-radius:var(--radius-xs);
  background:var(--red-muted);border:1px solid transparent;
  color:var(--red);font-size:.82rem;font-weight:500;
  transition:all .2s;
}
.logout-btn:hover{border-color:var(--red);}

/* MAIN CONTENT */
.content{
  margin-left:260px;flex:1;min-height:100vh;
  display:flex;flex-direction:column;
}
.topbar{
  padding:16px 32px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg-raised);position:sticky;top:0;z-index:40;
}
.topbar-title{font-weight:700;font-size:1.05rem;}
.topbar-clock{
  font-family:'JetBrains Mono',monospace;font-size:.82rem;color:var(--text-muted);
}
.page{padding:28px 32px;flex:1;max-width:1100px;width:100%;margin:0 auto;}

/* MOBILE */
.menu-toggle{
  display:none;padding:8px;background:none;border:none;
  color:var(--text-primary);font-size:1.4rem;
}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .content{margin-left:0;}
  .menu-toggle{display:block;}
  .page{padding:20px 16px;}
}

/* ========== ANIMATIONS ========== */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.anim{animation:fadeUp .45s var(--ease) both;}
.anim-d1{animation-delay:.05s}
.anim-d2{animation-delay:.1s}
.anim-d3{animation-delay:.15s}

/* ========== DASHBOARD ========== */
.dash-hero{text-align:center;padding:48px 20px 36px;}
.dash-hero h2{font-family:'Newsreader',serif;font-size:2.2rem;font-weight:800;}
.dash-hero p{color:var(--text-secondary);margin-top:6px;font-size:1rem;}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-top:8px;}
.dash-card{
  background:var(--bg-raised);border:1px solid var(--border);
  border-radius:var(--radius);padding:24px 20px;text-align:center;
  cursor:pointer;transition:all .3s var(--ease);
}
.dash-card:hover{border-color:var(--accent-border);transform:translateY(-3px);box-shadow:var(--shadow);}
.dash-card .dc-icon{font-size:2.2rem;margin-bottom:10px;}
.dash-card .dc-name{font-weight:700;font-size:.95rem;}
.dash-card .dc-sub{font-size:.78rem;color:var(--text-muted);margin-top:4px;}
.quick-stats{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:12px;margin-bottom:28px;
}
.qs-card{
  background:var(--bg-raised);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px;text-align:center;
}
.qs-val{font-family:'Newsreader',serif;font-size:1.9rem;font-weight:800;color:var(--accent);}
.qs-label{font-size:.75rem;color:var(--text-muted);margin-top:2px;}

/* ========== PANELS ========== */
.panels-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:768px){.panels-grid{grid-template-columns:1fr;}}
.panel{
  background:var(--bg-raised);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
}
.panel-full{grid-column:1/-1;}
.panel-head{
  padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  font-weight:600;font-size:.9rem;
}
.panel-body{padding:18px;}

/* ========== NOTES ========== */
.notes-textarea{
  width:100%;min-height:180px;background:var(--bg-input);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:14px;color:var(--text-primary);font-family:'JetBrains Mono',monospace;
  font-size:.83rem;line-height:1.75;resize:vertical;transition:border-color .2s;
}
.notes-textarea:focus{outline:none;border-color:var(--accent);}
.notes-textarea::placeholder{color:var(--text-muted);}
.save-indicator{font-size:.72rem;color:var(--green);margin-top:6px;opacity:0;transition:opacity .3s;}
.save-indicator.show{opacity:1;}

/* ========== TODOS ========== */
.todo-row{display:flex;gap:8px;margin-bottom:14px;}
.todo-inp{
  flex:1;padding:10px 14px;background:var(--bg-input);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text-primary);font-size:.88rem;
}
.todo-inp:focus{outline:none;border-color:var(--accent);}
.todo-btn{
  padding:10px 16px;background:var(--accent);color:#fff;border:none;
  border-radius:var(--radius-sm);font-weight:700;font-size:1rem;
}
.todo-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 0;border-bottom:1px solid var(--border);
}
.todo-item:last-child{border:none;}
.t-check{
  width:20px;height:20px;border-radius:50%;border:2px solid var(--text-muted);
  background:none;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.t-check.done{background:var(--green);border-color:var(--green);}
.t-check.done::after{content:'✓';color:#fff;font-size:.65rem;font-weight:700;}
.t-text{flex:1;font-size:.88rem;}
.t-text.done{text-decoration:line-through;color:var(--text-muted);}
.t-del{background:none;border:none;color:var(--text-muted);font-size:1.1rem;padding:4px;}
.t-del:hover{color:var(--red);}
.t-progress{margin-top:10px;}
.t-bar{height:4px;background:var(--bg-overlay);border-radius:2px;overflow:hidden;}
.t-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .4s;}
.t-pct{font-size:.72rem;color:var(--text-muted);margin-top:4px;text-align:right;}

/* ========== RESOURCES ========== */
.res-list{display:flex;flex-direction:column;gap:6px;}
.res-item{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--bg-surface);border-radius:var(--radius-sm);
  border:1px solid var(--border);font-size:.85rem;transition:border-color .2s;
}
.res-item:hover{border-color:var(--accent-border);}
.res-tag{
  font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:4px;
  text-transform:uppercase;letter-spacing:.5px;
}
.tag-book{background:var(--accent-muted);color:var(--accent);}
.tag-slides{background:var(--green-muted);color:var(--green);}
.tag-lab{background:var(--amber-muted);color:var(--amber);}
.tag-exam{background:var(--red-muted);color:var(--red);}

/* ========== AI CHAT ========== */
.chat-container{
  display:flex;flex-direction:column;height:420px;
  background:var(--bg-input);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
}
.chat-messages{
  flex:1;overflow-y:auto;padding:16px;display:flex;
  flex-direction:column;gap:10px;
}
.chat-msg{
  max-width:85%;padding:10px 14px;border-radius:var(--radius-sm);
  font-size:.87rem;line-height:1.6;word-wrap:break-word;
}
.chat-msg.user{
  align-self:flex-end;background:var(--accent);color:#fff;
  border-bottom-right-radius:2px;
}
.chat-msg.ai{
  align-self:flex-start;background:var(--bg-surface);
  border:1px solid var(--border);border-bottom-left-radius:2px;
}
.chat-msg.ai .typing-dots{display:inline-flex;gap:4px;}
.chat-msg.ai .typing-dots span{
  width:6px;height:6px;background:var(--text-muted);border-radius:50%;
  animation:blink 1.2s infinite;
}
.chat-msg.ai .typing-dots span:nth-child(2){animation-delay:.2s;}
.chat-msg.ai .typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
.chat-input-row{
  display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);
  background:var(--bg-raised);
}
.chat-input{
  flex:1;padding:10px 14px;background:var(--bg-input);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text-primary);font-size:.88rem;
}
.chat-input:focus{outline:none;border-color:var(--accent);}
.chat-send{
  padding:10px 20px;background:var(--accent);color:#fff;border:none;
  border-radius:var(--radius-sm);font-weight:600;font-size:.88rem;
  transition:background .2s;
}
.chat-send:hover{background:var(--accent-hover);}
.chat-send:disabled{opacity:.4;cursor:not-allowed;}

/* ========== AI SUMMARY GENERATOR ========== */
.summary-container{grid-column:1/-1;}
.summary-upload-zone{
  border:2px dashed var(--border-hover);border-radius:var(--radius);
  padding:28px;text-align:center;transition:all .3s var(--ease);
  cursor:pointer;position:relative;overflow:hidden;
}
.summary-upload-zone:hover,.summary-upload-zone.dragover{
  border-color:var(--accent);background:var(--accent-muted);
}
.summary-upload-zone .su-icon{font-size:2.2rem;margin-bottom:8px;}
.summary-upload-zone .su-text{color:var(--text-secondary);font-size:.9rem;}
.summary-upload-zone .su-hint{color:var(--text-muted);font-size:.75rem;margin-top:6px;}
.summary-upload-zone input[type="file"]{
  position:absolute;inset:0;opacity:0;cursor:pointer;
}
.summary-file-info{
  display:none;align-items:center;gap:10px;margin-top:12px;
  padding:10px 14px;background:var(--accent-muted);border:1px solid var(--accent-border);
  border-radius:var(--radius-sm);font-size:.85rem;
}
.summary-file-info.visible{display:flex;}
.summary-file-info .sf-name{flex:1;font-weight:600;color:var(--accent);}
.summary-file-info .sf-size{color:var(--text-muted);font-size:.78rem;}
.summary-file-info .sf-remove{
  background:none;border:none;color:var(--red);font-size:1.1rem;cursor:pointer;padding:4px;
}
.summary-or{
  text-align:center;color:var(--text-muted);font-size:.8rem;
  margin:12px 0;font-weight:500;
}
.summary-textarea{
  width:100%;min-height:100px;padding:14px;
  background:var(--bg-input);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text-primary);
  font-size:.88rem;line-height:1.6;resize:vertical;
}
.summary-textarea:focus{outline:none;border-color:var(--accent);}
.summary-actions{display:flex;gap:10px;margin-top:12px;align-items:center;flex-wrap:wrap;}
.summary-gen-btn{
  padding:12px 28px;background:var(--accent);
  color:#fff;border:none;border-radius:var(--radius-sm);
  font-weight:600;font-size:.9rem;transition:background .2s;
  display:flex;align-items:center;gap:8px;
}
.summary-gen-btn:hover{background:var(--accent-hover);}
.summary-gen-btn:disabled{opacity:.4;cursor:not-allowed;}
.summary-status{font-size:.8rem;color:var(--text-muted);}
.summary-output{
  margin-top:16px;padding:20px;background:var(--bg-surface);
  border:1px solid var(--border);border-radius:var(--radius);
  font-size:.88rem;line-height:1.7;white-space:pre-wrap;
  display:none;
}
.summary-output.visible{display:block;}

/* ========== PRESENTATION ========== */
.pres-wrapper{
  background:var(--bg-raised);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);
  grid-column:1/-1;
}
.pres-stage{
  aspect-ratio:16/9;background:var(--bg-base);
  position:relative;overflow:hidden;
}
.slide{
  width:100%;height:100%;padding:5% 7%;
  display:flex;flex-direction:column;justify-content:center;
  position:absolute;inset:0;
  opacity:0;transform:translateX(40px);
  transition:all .5s var(--ease);pointer-events:none;
}
.slide.active{opacity:1;transform:none;pointer-events:auto;}
.slide-tag{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(.55rem,1.2vw,.72rem);
  color:var(--accent);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;
}
.slide h2{
  font-family:'Newsreader',serif;
  font-size:clamp(1.1rem,3vw,2rem);font-weight:800;line-height:1.2;margin-bottom:14px;
}
.slide h3{font-family:'Newsreader',serif;font-size:clamp(.85rem,2vw,1.3rem);font-weight:700;margin-bottom:10px;color:var(--accent);}
.slide p,.slide li{font-size:clamp(.68rem,1.4vw,.9rem);color:var(--text-secondary);line-height:1.7;}
.slide ul{list-style:none;padding:0;}
.slide li{padding:3px 0;}
.slide li::before{content:'▸';color:var(--accent);margin-right:8px;font-weight:bold;}
.s-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:10px;}
@media(max-width:600px){.s-grid{grid-template-columns:1fr;}}
.s-card{
  background:var(--bg-surface);padding:14px;border-radius:var(--radius-sm);
  border-left:3px solid var(--accent);
}
.s-card h4{font-size:clamp(.65rem,1.2vw,.85rem);font-weight:700;margin-bottom:4px;}
.s-card p{font-size:clamp(.58rem,1vw,.76rem)!important;}
.formula{
  background:var(--bg-surface);padding:12px 18px;border-radius:var(--radius-sm);
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(.62rem,1.2vw,.85rem);
  color:var(--accent);margin:8px 0;border:1px solid var(--border);text-align:center;
}
.s-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:clamp(.58rem,1vw,.78rem);}
.s-table th,.s-table td{padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);}
.s-table th{color:var(--accent);font-weight:600;font-size:clamp(.52rem,.95vw,.7rem);text-transform:uppercase;letter-spacing:.5px;}
.pres-controls{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;border-top:1px solid var(--border);
}
.p-btn{
  padding:8px 18px;border-radius:var(--radius-xs);
  border:1px solid var(--border);background:var(--bg-surface);
  color:var(--text-primary);font-weight:500;font-size:.82rem;transition:all .2s;
}
.p-btn:hover{border-color:var(--accent-border);color:var(--accent);}
.p-btn:disabled{opacity:.25;cursor:default;}
.p-dots{display:flex;gap:5px;}
.p-dot{
  width:7px;height:7px;border-radius:50%;background:var(--text-muted);
  border:none;cursor:pointer;transition:all .3s;
}
.p-dot.active{background:var(--accent);transform:scale(1.4);}
.p-counter{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--text-muted);}

/* ========== API KEY CONFIG ========== */
.api-config{
  padding:20px;background:var(--bg-surface);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:20px;
}
.api-config summary{

<script>

const RATING_SLIDES = [
  { tag:'MCCP — Modele de Rating', title:'Modele de Rating', subtitle:'Concepte, Tipologii și Aplicații',

    <div class="s-grid" style="margin-top:20px;"><div class="s-card"><h4>📌 Obiectiv</h4><p>Cuantificarea probabilității de nerambursare (PD)</p></div><div class="s-card"><h4>📌 Utilizare</h4><p>Decizii de creditare, pricing, cerințe de capital</p></div></div>`},
  { tag:'Slide 2', title:'De ce avem nevoie de Rating?',
    content:`<ul><li>Asimetria informațională debitor — creditor</li><li>Reglementări prudenţiale (Basel II / III / IV)</li><li>Standardizarea evaluării riscului de credit</li><li>Optimizarea alocării capitalului economic</li><li>Cerințe de transparență și raportare</li></ul><div class="formula" style="margin-top:18px;">Expected Loss = PD × LGD × EAD</div>`},

  { tag:'Slide 4', title:'Scala de Rating — Agenții Majore',
    content:`<table class="s-table"><thead><tr><th>Risc</th><th>S&P</th><th>Moody's</th><th>Descriere</th></tr></thead><tbody><tr><td>🟢</td><td>AAA</td><td>Aaa</td><td>Cea mai înaltă calitate</td></tr><tr><td>🟢</td><td>AA</td><td>Aa</td><td>Calitate foarte ridicată</td></tr><tr><td>🟢</td><td>A</td><td>A</td><td>Calitate ridicată</td></tr><tr><td>🟡</td><td>BBB</td><td>Baa</td><td>Medie — limita investment grade</td></tr><tr><td>🔴</td><td>BB+↓</td><td>Ba↓</td><td>Speculative / Junk</td></tr><tr><td>⚫</td><td>D</td><td>C</td><td>Default</td></tr></tbody></table>`},
  { tag:'Slide 5', title:'Modelul Altman Z-Score',
    content:`<p>Model statistic de predicție a falimentului (Altman, 1968).</p><div class="formula">Z = 1.2·X₁ + 1.4·X₂ + 3.3·X₃ + 0.6·X₄ + 1.0·X₅</div><div class="s-grid" style="margin-top:10px;"><div class="s-card"><h4>Variabile</h4><p>X₁=WC/TA, X₂=RE/TA, X₃=EBIT/TA, X₄=MVE/BVD, X₅=Sales/TA</p></div><div class="s-card"><h4>Zone</h4><p>Z>2.99 → Safe<br>1.81-2.99 → Grey<br>Z<1.81 → Distress</p></div></div>`},

  { tag:'Slide 7', title:'Variabile Frecvente în Modele',

// ============================
// STATE
// ============================
let state = {
  tab: 'dashboard',
  pin: null,
  apiKey: '',
  notes: {},
  todos: {},
  chatHistories: {},
  slide: 0,
};

function loadState() {
  try {
    const raw = localStorage.getItem('ash_state');
    if (raw) {
      const s = JSON.parse(raw);
      Object.assign(state, s);
    }
  } catch(e) {}
}
function saveState() {
  localStorage.setItem('ash_state', JSON.stringify(state));
}
loadState();

// ============================
// AUTH
// ============================
function handleLock() {
  const inp = document.getElementById('lockInput');
  const val = inp.value.trim();
  if (!val) return;
  if (!state.pin) {
    // First time — set PIN
    state.pin = btoa(val);
    saveState();
    unlock();
  } else {
    if (btoa(val) === state.pin) {
      unlock();
    } else {
      document.getElementById('lockError').style.display = 'block';
      inp.value = '';
      inp.focus();
    }
  }
}
function unlock() {
  document.getElementById('lockScreen').classList.add('hidden');
  document.getElementById('app').style.display = 'flex';
  updateThemeBtn();
  renderSidebar();
  renderPage();
}
function handleLogout() {
  document.getElementById('lockScreen').classList.remove('hidden');
  document.getElementById('app').style.display = 'none';
  document.getElementById('lockInput').value = '';
  document.getElementById('lockError').style.display = 'none';
  document.getElementById('lockHint').style.display = state.pin ? 'none' : 'block';
}
document.getElementById('lockInput').addEventListener('keydown', e => { if(e.key==='Enter') handleLock(); });
// Check if PIN exists
if (state.pin) {
  document.getElementById('lockHint').style.display = 'none';
} else {
  document.getElementById('lockHint').style.display = 'block';
}

// ============================
// THEME
// ============================
const savedTheme = localStorage.getItem('ash_theme') || 'dark';
document.body.setAttribute('data-theme', savedTheme);
function toggleTheme() {
  const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.body.setAttribute('data-theme', t);
  localStorage.setItem('ash_theme', t);
  updateThemeBtn();
}
function updateThemeBtn() {
  const btn = document.getElementById('themeBtn');
  if(btn) btn.textContent = document.body.getAttribute('data-theme')==='dark' ? '🌙 Dark' : '☀️ Light';
}

// CLOCK
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
setInterval(updateClock, 15000); updateClock();

// ============================
// SIDEBAR
// ============================
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  let h = `<div class="nav-section">General</div>
    <button class="nav-item ${state.tab==='dashboard'?'active':''}" onclick="go('dashboard')">
      <span class="ni-icon">🏠</span> Dashboard
    </button>
    <div class="nav-section">Materii</div>`;
  for (const [k, s] of Object.entries(SUBJECTS)) {
    const todoCount = (state.todos[k]||[]).filter(t=>!t.done).length;
    h += `<button class="nav-item ${state.tab===k?'active':''}" onclick="go('${k}')">
      <span class="ni-icon">${s.icon}</span> ${s.name}
      ${todoCount ? `<span class="ni-badge">${todoCount}</span>` : ''}
    </button>`;
  }
  nav.innerHTML = h;
}

function go(tab) {
  state.tab = tab;
  state.slide = 0;
  renderSidebar();
  renderPage();
  document.getElementById('sidebar').classList.remove('open');
}

// ============================
// PAGE ROUTER
// ============================
function renderPage() {
  const page = document.getElementById('pageContent');
  const title = document.getElementById('topbarTitle');
  if (state.tab === 'dashboard') {
    title.textContent = 'Dashboard';
    renderDashboard(page);
  } else {
    const s = SUBJECTS[state.tab];
    title.textContent = s.name + ' — ' + s.full;
    renderSubject(page, state.tab, s);
  }
}

// ============================
// DASHBOARD
// ============================
function renderDashboard(el) {
  const totalT = Object.values(state.todos).flat().length;
  const doneT = Object.values(state.todos).flat().filter(t=>t.done).length;
  const notesCount = Object.values(state.notes).filter(n=>n&&n.trim()).length;

  let h = `<div class="anim">
    <div class="dash-hero">
      <h2>Bun venit la Study Hub</h2>
      <p>Platforma ta AI-powered pentru sesiune</p>
    </div>
    <div class="quick-stats anim anim-d1">
      <div class="qs-card"><div class="qs-val">5</div><div class="qs-label">Materii</div></div>
      <div class="qs-card"><div class="qs-val">${totalT}</div><div class="qs-label">Tasks</div></div>
      <div class="qs-card"><div class="qs-val">${totalT?Math.round(doneT/totalT*100):0}%</div><div class="qs-label">Progres</div></div>
      <div class="qs-card"><div class="qs-val">${notesCount}</div><div class="qs-label">Notițe</div></div>
    </div>`;

  // API Key config
  h += `<details class="api-config anim anim-d2" ${!state.apiKey?'open':''}>
    <summary>🔑 Configurare API Anthropic ${state.apiKey ? '— ✅ Configurat' : '— necesară pentru AI'}</summary>
    <p style="font-size:.82rem;color:var(--text-secondary);margin-top:10px;">
      Pentru chat AI și rezumate, ai nevoie de un API key de la
      <a href="https://console.anthropic.com/" target="_blank" style="color:var(--accent);">console.anthropic.com</a>.
      Key-ul se salvează doar local pe dispozitivul tău.
    </p>
    <div class="api-row">
      <input type="password" class="api-inp" id="apiKeyInput" placeholder="sk-ant-api03-..." value="${state.apiKey||''}">
      <button class="api-save" onclick="saveApiKey()">Salvează</button>
    </div>
    <div class="api-status" id="apiStatus"></div>
  </details>`;

  h += `<div class="dash-grid anim anim-d3">`;
  for (const [k, s] of Object.entries(SUBJECTS)) {
    const st = state.todos[k]||[];
    const d = st.filter(t=>t.done).length;
    h += `<div class="dash-card" onclick="go('${k}')">
      <div class="dc-icon">${s.icon}</div>
      <div class="dc-name">${s.name}</div>
      <div class="dc-sub">${st.length ? d+'/'+st.length+' tasks' : 'Click to start'}</div>
    </div>`;
  }
  h += `</div></div>`;
  el.innerHTML = h;
}

function saveApiKey() {
  const inp = document.getElementById('apiKeyInput');
  const status = document.getElementById('apiStatus');
  state.apiKey = inp.value.trim();
  saveState();
  if (state.apiKey) {
    status.className = 'api-status ok';
    status.textContent = '✅ API key salvat local. Funcțiile AI sunt active.';
  } else {
    status.className = 'api-status err';
    status.textContent = '⚠️ API key șters. Funcțiile AI nu vor funcționa.';
  }
}

// ============================
// SUBJECT PAGE
// ============================
function renderSubject(el, key, subj) {
  const todos = state.todos[key] || [];
  const done = todos.filter(t=>t.done).length;
  const total = todos.length;

  let h = `<div class="anim">
    <div class="subj-header">
      <div class="subj-icon" style="background:${subj.color.replace('var(','').replace(')','')==='var(--accent)' ? 'var(--accent-muted)' : subj.color.replace(')','-muted)')};border:2px solid ${subj.color}">${subj.icon}</div>
      <div><div class="subj-name">${subj.name}</div><div class="subj-desc">${subj.full} — ${subj.desc}</div></div>
    </div>

    <div class="quick-stats anim-d1">
      <div class="qs-card"><div class="qs-val">${subj.resources.length}</div><div class="qs-label">Resurse</div></div>
      <div class="qs-card"><div class="qs-val">${total}</div><div class="qs-label">Tasks</div></div>
      <div class="qs-card"><div class="qs-val">${total?Math.round(done/total*100):0}%</div><div class="qs-label">Completat</div></div>
    </div>

    <div class="panels-grid">`;

  // === MCCP PRESENTATION ===
  if (key === 'mccp') {
    h += renderPresentation();
  }

  // === AI CHAT ===
  h += `<div class="panel panel-full anim-d2">
    <div class="panel-head"><span>🤖 AI Tutor — ${subj.name}</span><span style="font-size:.72rem;color:var(--text-muted);">powered by Claude</span></div>
    <div class="panel-body">
      ${!state.apiKey ? '<div style="text-align:center;padding:20px;color:var(--text-muted);">⚠️ Configurează API key-ul din Dashboard pentru a activa AI Tutor</div>' :
      `<div class="chat-container" id="chatBox">
        <div class="chat-messages" id="chatMessages">${renderChatHistory(key)}</div>
        <div class="chat-input-row">
          <input class="chat-input" id="chatInput" placeholder="Pune o întrebare despre ${subj.name}..." onkeydown="if(event.key==='Enter'&&!event.shiftKey)sendChat('${key}')">
          <button class="chat-send" id="chatSendBtn" onclick="sendChat('${key}')">Trimite</button>
        </div>
      </div>`}
    </div>
  </div>`;

  // === AI SUMMARY GENERATOR ===
  h += `<div class="panel panel-full summary-container anim-d2">
    <div class="panel-head"><span>✨ Generator Rezumate AI</span><span style="font-size:.72rem;color:var(--text-muted);">upload fișier sau lipește text</span></div>
    <div class="panel-body">
      ${!state.apiKey ? '<div style="text-align:center;padding:20px;color:var(--text-muted);">⚠️ Configurează API key-ul din Dashboard</div>' :
      `<div class="summary-upload-zone" id="uploadZone">
        <input type="file" id="fileUpload" accept=".pdf,.txt,.doc,.docx,.md,.csv,.pptx" onchange="handleFileUpload(event)">
        <div class="su-icon">📄</div>
        <div class="su-text">Trage un fișier aici sau click pentru a încărca</div>
        <div class="su-hint">PDF, TXT, DOCX, PPTX, MD, CSV — max 10MB</div>
      </div>
      <div class="summary-file-info" id="fileInfo">
        <span>📎</span>
        <span class="sf-name" id="fileName"></span>
        <span class="sf-size" id="fileSize"></span>
        <button class="sf-remove" onclick="removeFile()">✕</button>
      </div>
      <div class="summary-or">— sau lipește textul manual —</div>
      <textarea class="summary-textarea" id="summaryInput" placeholder="Lipește aici textul din curs, PDF, sau notițe..."></textarea>
      <div class="summary-actions">
        <button class="summary-gen-btn" id="summaryBtn" onclick="generateSummary('${key}')">
          <span>✨</span> Generează Rezumat
        </button>
        <span class="summary-status" id="summaryStatus"></span>
      </div>
      <div class="summary-output" id="summaryOutput"></div>`}
    </div>
  </div>`;

  // === NOTES ===
  h += `<div class="panel">
    <div class="panel-head"><span>📝 Notițe</span><span style="font-size:.72rem;color:var(--text-muted)">auto-save</span></div>
    <div class="panel-body">
      <textarea class="notes-textarea" id="notesArea" placeholder="Scrie notițele tale aici...">${state.notes[key]||''}</textarea>
      <div class="save-indicator" id="noteSaved">✓ Salvat</div>
    </div>
  </div>`;

  // === TODOS ===
  h += `<div class="panel">
    <div class="panel-head"><span>✅ To-Do</span></div>
    <div class="panel-body">
      <div class="todo-row">
        <input class="todo-inp" id="todoInp" placeholder="Adaugă task..." onkeydown="if(event.key==='Enter')addTodo('${key}')">
        <button class="todo-btn" onclick="addTodo('${key}')">+</button>
      </div>
      <div id="todoList">${renderTodos(key)}</div>
    </div>
  </div>`;

  // === RESOURCES ===
  h += `<div class="panel panel-full">
    <div class="panel-head"><span>📚 Resurse</span></div>
    <div class="panel-body">
      <div class="res-list">
        ${subj.resources.map(r=>`<div class="res-item"><span class="res-tag tag-${r.tag}">${r.tag}</span><span>${r.label}</span></div>`).join('')}
      </div>
    </div>
  </div>`;

  h += `</div></div>`;
  el.innerHTML = h;

  // Setup notes autosave
  const notesArea = document.getElementById('notesArea');
  if (notesArea) {
    let st;
    notesArea.addEventListener('input', () => {
      state.notes[key] = notesArea.value;
      clearTimeout(st);
      st = setTimeout(() => {
        saveState();
        const sv = document.getElementById('noteSaved');
        if(sv){sv.classList.add('show');setTimeout(()=>sv.classList.remove('show'),1500);}
      }, 500);
    });
  }

  if (key === 'mccp') setupPresNav();

  // Setup file upload drag & drop
  setupDragDrop();

  // Scroll chat to bottom
  const cm = document.getElementById('chatMessages');
  if (cm) cm.scrollTop = cm.scrollHeight;
}

// ============================
// TODOS
// ============================
function renderTodos(key) {
  const items = state.todos[key] || [];
  if (!items.length) return '<div style="text-align:center;color:var(--text-muted);padding:16px;font-size:.88rem;">Niciun task</div>';
  const done = items.filter(i=>i.done).length;
  const pct = Math.round(done/items.length*100);
  let h = items.map((item,i)=>`
    <div class="todo-item">
      <button class="t-check ${item.done?'done':''}" onclick="toggleTodo('${key}',${i})"></button>
      <span class="t-text ${item.done?'done':''}">${esc(item.text)}</span>
      <button class="t-del" onclick="delTodo('${key}',${i})">×</button>
    </div>`).join('');
  h += `<div class="t-progress"><div class="t-bar"><div class="t-fill" style="width:${pct}%"></div></div><div class="t-pct">${done}/${items.length}</div></div>`;
  return h;
}
function addTodo(key) {
  const inp = document.getElementById('todoInp');
  const t = inp.value.trim(); if(!t) return;
  if(!state.todos[key]) state.todos[key]=[];
  state.todos[key].push({text:t,done:false});
  saveState(); inp.value='';
  document.getElementById('todoList').innerHTML = renderTodos(key);
  renderSidebar();
}
function toggleTodo(key,i) {
  if(state.todos[key]&&state.todos[key][i]){
    state.todos[key][i].done=!state.todos[key][i].done;
    saveState();
    document.getElementById('todoList').innerHTML=renderTodos(key);
    renderSidebar();
  }
}
function delTodo(key,i) {
  if(state.todos[key]){state.todos[key].splice(i,1);saveState();
  document.getElementById('todoList').innerHTML=renderTodos(key);renderSidebar();}
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ============================
// AI CHAT
// ============================
function renderChatHistory(key) {
  const hist = state.chatHistories[key] || [];
  if (!hist.length) return `<div class="chat-msg ai">Salut! Sunt tutorul tău AI pentru <strong>${SUBJECTS[key].name}</strong>. Întreabă-mă orice despre materie — voi explica cât mai plastic și clar. 🎓</div>`;
  return hist.map(m => `<div class="chat-msg ${m.role==='user'?'user':'ai'}">${m.role==='user'?esc(m.content):m.content}</div>`).join('');
}

async function sendChat(key) {
  if (!state.apiKey) return;
  const inp = document.getElementById('chatInput');
  const btn = document.getElementById('chatSendBtn');
  const msgs = document.getElementById('chatMessages');
  const text = inp.value.trim();
  if (!text) return;

  // Add user msg
  if (!state.chatHistories[key]) state.chatHistories[key] = [];
  state.chatHistories[key].push({role:'user',content:text});
  saveState();

  // Render
  msgs.innerHTML = renderChatHistory(key);
  inp.value = '';
  btn.disabled = true;

  // Typing indicator
  const typing = document.createElement('div');
  typing.className = 'chat-msg ai';
  typing.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  msgs.appendChild(typing);
  msgs.scrollTop = msgs.scrollHeight;

  try {
    // Build messages for API
    const apiMessages = state.chatHistories[key]
      .filter(m => m.role === 'user' || m.role === 'assistant')
      .map(m => ({role: m.role === 'user' ? 'user' : 'assistant', content: m.content}));

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: SUBJECTS[key].systemPrompt + '\n\nRăspunde în română. Fii concis dar complet. Folosește analogii din viața reală, emoji-uri pentru claritate, și formatează cu bold/liste când ajută. Dacă e o formulă, explică fiecare termen.',
        messages: apiMessages
      })
    });

    const data = await resp.json();
    typing.remove();

    if (data.content && data.content[0]) {
      const aiText = data.content[0].text;
      // Simple markdown-like formatting
      const formatted = formatAI(aiText);
      state.chatHistories[key].push({role:'assistant',content:formatted});
      saveState();
    } else if (data.error) {
      state.chatHistories[key].push({role:'assistant',content:`⚠️ Eroare API: ${data.error.message}`});
      saveState();
    }
  } catch(err) {
    typing.remove();
    state.chatHistories[key].push({role:'assistant',content:`⚠️ Eroare de conexiune: ${err.message}`});
    saveState();
  }

  msgs.innerHTML = renderChatHistory(key);
  msgs.scrollTop = msgs.scrollHeight;
  btn.disabled = false;
}

function formatAI(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code style="background:var(--bg-overlay);padding:2px 6px;border-radius:3px;font-family:JetBrains Mono,monospace;font-size:.82rem;">$1</code>')
    .replace(/\n/g, '<br>');
}

// ============================
// AI SUMMARY GENERATOR
// ============================
let uploadedFileText = '';

function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  processFile(file);
}

function processFile(file) {
  const maxSize = 10 * 1024 * 1024; // 10MB
  if (file.size > maxSize) {
    alert('Fișierul e prea mare (max 10MB)');
    return;
  }

  const ext = file.name.split('.').pop().toLowerCase();
  const statusEl = document.getElementById('summaryStatus');
  if (statusEl) statusEl.textContent = '⏳ Se extrage textul...';

  // Show file info
  const fi = document.getElementById('fileInfo');
  const fn = document.getElementById('fileName');
  const fs = document.getElementById('fileSize');
  if (fi) fi.classList.add('visible');
  if (fn) fn.textContent = file.name;
  if (fs) fs.textContent = formatFileSize(file.size);

  if (ext === 'txt' || ext === 'md' || ext === 'csv') {
    // Plain text files
    const reader = new FileReader();
    reader.onload = (e) => {
      uploadedFileText = e.target.result;
      document.getElementById('summaryInput').value = uploadedFileText.substring(0, 500) + (uploadedFileText.length > 500 ? '\n\n... [text complet încărcat — ' + uploadedFileText.length + ' caractere]' : '');
      if (statusEl) statusEl.textContent = '✅ ' + uploadedFileText.length + ' caractere extrase';
    };
    reader.readAsText(file);
  } else if (ext === 'pdf') {
    // PDF — use PDF.js
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        if (!window.pdfjsLib) {
          // Load PDF.js dynamically
          await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
          pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }
        const typedArray = new Uint8Array(e.target.result);
        const pdf = await pdfjsLib.getDocument(typedArray).promise;
        let text = '';
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          text += content.items.map(item => item.str).join(' ') + '\n\n';
        }
        uploadedFileText = text.trim();
        document.getElementById('summaryInput').value = uploadedFileText.substring(0, 500) + (uploadedFileText.length > 500 ? '\n\n... [PDF complet — ' + pdf.numPages + ' pagini, ' + uploadedFileText.length + ' caractere]' : '');
        if (statusEl) statusEl.textContent = '✅ PDF: ' + pdf.numPages + ' pagini, ' + uploadedFileText.length + ' caractere';
      } catch(err) {
        if (statusEl) statusEl.textContent = '⚠️ Eroare PDF: ' + err.message;
        uploadedFileText = '';
      }
    };
    reader.readAsArrayBuffer(file);
  } else if (ext === 'docx' || ext === 'pptx') {
    // DOCX/PPTX — extract text from XML inside ZIP using JSZip
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        if (!window.JSZip) {
          await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
        }
        const zip = await JSZip.loadAsync(e.target.result);
        let text = '';
        
        if (ext === 'docx') {
          const docXml = await zip.file('word/document.xml')?.async('text');
          if (docXml) {
            // Extract text from XML tags
            text = docXml.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
          }
        } else if (ext === 'pptx') {
          // Extract from all slides
          const slideFiles = Object.keys(zip.files).filter(f => f.match(/ppt\/slides\/slide\d+\.xml/)).sort();
          for (const sf of slideFiles) {
            const slideXml = await zip.file(sf)?.async('text');
            if (slideXml) {
              text += slideXml.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim() + '\n\n';
            }
          }
        }
        
        uploadedFileText = text.trim();
        document.getElementById('summaryInput').value = uploadedFileText.substring(0, 500) + (uploadedFileText.length > 500 ? '\n\n... [' + ext.toUpperCase() + ' complet — ' + uploadedFileText.length + ' caractere]' : '');
        if (statusEl) statusEl.textContent = '✅ ' + ext.toUpperCase() + ': ' + uploadedFileText.length + ' caractere extrase';
      } catch(err) {
        if (statusEl) statusEl.textContent = '⚠️ Eroare ' + ext + ': ' + err.message;
        uploadedFileText = '';
      }
    };
    reader.readAsArrayBuffer(file);
  } else {
    if (statusEl) statusEl.textContent = '⚠️ Format nesuportat: ' + ext;
  }
}

function removeFile() {
  uploadedFileText = '';
  const fi = document.getElementById('fileInfo');
  if (fi) fi.classList.remove('visible');
  const inp = document.getElementById('fileUpload');
  if (inp) inp.value = '';
  document.getElementById('summaryInput').value = '';
  const statusEl = document.getElementById('summaryStatus');
  if (statusEl) statusEl.textContent = '';
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

// Setup drag & drop after render
function setupDragDrop() {
  const zone = document.getElementById('uploadZone');
  if (!zone) return;
  ['dragenter','dragover'].forEach(evt => {
    zone.addEventListener(evt, (e) => { e.preventDefault(); zone.classList.add('dragover'); });
  });
  ['dragleave','drop'].forEach(evt => {
    zone.addEventListener(evt, (e) => { e.preventDefault(); zone.classList.remove('dragover'); });
  });
  zone.addEventListener('drop', (e) => {
    const file = e.dataTransfer.files[0];
    if (file) processFile(file);
  });
}

async function generateSummary(key) {
  if (!state.apiKey) return;
  const inp = document.getElementById('summaryInput');
  const btn = document.getElementById('summaryBtn');
  const out = document.getElementById('summaryOutput');
  const statusEl = document.getElementById('summaryStatus');
  
  // Use uploaded file text if available, otherwise textarea
  const text = uploadedFileText || inp.value.trim();
  if (!text) {
    if (statusEl) statusEl.textContent = '⚠️ Încarcă un fișier sau lipește text mai întâi';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span> Se generează...';
  out.classList.add('visible');
  out.textContent = 'Se procesează...';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        system: `Ești un expert în ${SUBJECTS[key].full}. Creează un rezumat structurat al textului primit. 
Format:
📋 REZUMAT — [titlu scurt]

🎯 Puncte Cheie:
• [punct 1]
• [punct 2]
...

📐 Formule/Concepte Importante:
[dacă există]

💡 De Reținut pentru Examen:
• [ce e important]

🔗 Legături cu alte concepte:
• [conexiuni]

Răspunde în română. Fii concis dar complet.`,
        messages: [{role:'user', content: `Rezumă acest text de la cursul de ${SUBJECTS[key].name}:\n\n${text}`}]
      })
    });

    const data = await resp.json();
    if (data.content && data.content[0]) {
      out.innerHTML = formatAI(data.content[0].text);
    } else if (data.error) {
      out.textContent = '⚠️ Eroare: ' + data.error.message;
    }
  } catch(err) {
    out.textContent = '⚠️ Eroare: ' + err.message;
  }

  btn.disabled = false;
  btn.innerHTML = '<span>✨</span> Generează Rezumat';
}

// ============================
// PRESENTATION
// ============================
function renderPresentation() {
  const slides = RATING_SLIDES;
  return `<div class="pres-wrapper anim-d1">
    <div class="pres-stage" id="presStage">
      ${slides.map((s,i) => `
        <div class="slide ${i===0?'active':''}" data-slide="${i}">
          <div class="slide-tag">${s.tag}</div>
          <h2>${s.title}</h2>
          ${s.subtitle?`<p style="color:var(--text-secondary);font-size:clamp(.78rem,1.4vw,1rem);margin-bottom:6px;">${s.subtitle}</p>`:''}
          ${s.content}
        </div>`).join('')}
    </div>
    <div class="pres-controls">
      <button class="p-btn" id="prevBtn" onclick="presNav(-1)">← Prev</button>
      <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
        <div class="p-dots" id="presDots">
          ${slides.map((_,i)=>`<button class="p-dot ${i===0?'active':''}" onclick="goSlide(${i})"></button>`).join('')}
        </div>
        <span class="p-counter" id="slideCounter">1 / ${slides.length}</span>
      </div>
      <button class="p-btn" id="nextBtn" onclick="presNav(1)">Next →</button>
    </div>
  </div>`;
}

function setupPresNav() {
  updatePresUI();
  document.onkeydown = e => {
    if (state.tab!=='mccp') return;
    if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
    if (e.key==='ArrowRight') presNav(1);
    if (e.key==='ArrowLeft') presNav(-1);
  };
}
function presNav(dir) {
  const n = state.slide + dir;
  if (n<0||n>=RATING_SLIDES.length) return;
  state.slide = n;
  updatePresUI();
}
function goSlide(i) { state.slide=i; updatePresUI(); }
function updatePresUI() {
  document.querySelectorAll('.slide').forEach((s,i) => {
    s.classList.toggle('active', i===state.slide);
    s.style.transform = i<state.slide?'translateX(-40px)': i>state.slide?'translateX(40px)':'none';
  });
  document.querySelectorAll('.p-dot').forEach((d,i)=>d.classList.toggle('active',i===state.slide));
  const c=document.getElementById('slideCounter');
  if(c) c.textContent=`${state.slide+1} / ${RATING_SLIDES.length}`;
  const p=document.getElementById('prevBtn'),n=document.getElementById('nextBtn');
  if(p) p.disabled=state.slide===0;
  if(n) n.disabled=state.slide===RATING_SLIDES.length-1;
}
