<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASE Study Hub — AI-Powered</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Newsreader:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* =============================================
   THEME SYSTEM
   ============================================= */
:root {
  --bg-base: #0b0d11;
  --bg-raised: #12151c;
  --bg-surface: #181c26;
  --bg-overlay: #1e2330;
  --bg-input: #141720;
  --text-primary: #e4e6ed;
  --text-secondary: #8b90a0;
  --text-muted: #555a6b;
  --accent: #7b68ee;
  --accent-hover: #9183f5;
  --accent-muted: rgba(123, 104, 238, 0.12);
  --accent-border: rgba(123, 104, 238, 0.25);
  --green: #3dd68c;
  --green-muted: rgba(61, 214, 140, 0.12);
  --amber: #f0b45b;
  --amber-muted: rgba(240, 180, 91, 0.12);
  --red: #f06272;
  --red-muted: rgba(240, 98, 114, 0.12);
  --blue: #5ba8f0;
  --blue-muted: rgba(91, 168, 240, 0.12);
  --border: rgba(255, 255, 255, 0.05);
  --border-hover: rgba(255, 255, 255, 0.1);
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  --radius: 14px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="light"] {
  --bg-base: #f4f2ee;
  --bg-raised: #ffffff;
  --bg-surface: #f0ede7;
  --bg-overlay: #e8e4dc;
  --bg-input: #f7f5f1;
  --text-primary: #1a1a28;
  --text-secondary: #5c5c72;
  --text-muted: #9494a8;
  --accent: #6554d4;
  --accent-hover: #7b6aef;
  --accent-muted: rgba(101, 84, 212, 0.07);
  --accent-border: rgba(101, 84, 212, 0.2);
  --green: #1fa86a;
  --green-muted: rgba(31, 168, 106, 0.08);
  --amber: #c78d2e;
  --amber-muted: rgba(199, 141, 46, 0.08);
  --red: #d4465a;
  --red-muted: rgba(212, 70, 90, 0.08);
  --blue: #3b7fd4;
  --blue-muted: rgba(59, 127, 212, 0.08);
  --border: rgba(0, 0, 0, 0.06);
  --border-hover: rgba(0, 0, 0, 0.12);
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
}

/* =============================================
   RESET & BASE
   ============================================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  transition: background 0.35s var(--ease), color 0.35s var(--ease);
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

button { cursor: pointer; font-family: inherit; }
input, textarea, select { font-family: inherit; }

/* =============================================
   LOCK SCREEN
   ============================================= */
.lock-screen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--bg-base);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s, transform 0.5s;
}

.lock-screen.hidden {
  opacity: 0;
  pointer-events: none;
  transform: scale(1.05);
}

.lock-box {
  text-align: center;
  width: 340px;
  animation: lockIn 0.6s var(--ease) both;
}

@keyframes lockIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: none; }
}

.lock-logo { font-size: 3rem; margin-bottom: 8px; }

.lock-title {
  font-family: 'Newsreader', serif;
  font-size: 1.8rem;
  font-weight: 800;
  margin-bottom: 4px;
}

.lock-sub {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-bottom: 28px;
}

.lock-input {
  width: 100%;
  padding: 14px 18px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 1rem;
  text-align: center;
  letter-spacing: 4px;
  transition: border-color 0.2s;
}

.lock-input:focus { outline: none; border-color: var(--accent); }
.lock-input::placeholder { letter-spacing: 0; color: var(--text-muted); }

.lock-btn {
  margin-top: 14px;
  width: 100%;
  padding: 13px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 0.95rem;
  transition: background 0.2s;
}

.lock-btn:hover { background: var(--accent-hover); }
.lock-hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 14px; }
.lock-error { color: var(--red); font-size: 0.82rem; margin-top: 8px; display: none; }

/* =============================================
   APP LAYOUT
   ============================================= */
.app {
  display: flex;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: var(--bg-raised);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
  z-index: 50;
  transition: transform 0.35s var(--ease);
}

.sidebar-brand {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-brand h1 {
  font-family: 'Newsreader', serif;
  font-size: 1.25rem;
  font-weight: 800;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-brand h1 span {
  background: linear-gradient(135deg, var(--accent), var(--blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.sidebar-nav {
  flex: 1;
  padding: 12px 10px;
  overflow-y: auto;
}

.nav-section {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 12px 10px 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  background: transparent;
  border: none;
  width: 100%;
  text-align: left;
  color: var(--text-secondary);
  font-size: 0.88rem;
  font-weight: 500;
  transition: all 0.2s;
}

.nav-item:hover { background: var(--bg-surface); color: var(--text-primary); }
.nav-item.active { background: var(--accent-muted); color: var(--accent); }
.nav-item .ni-icon { font-size: 1.15rem; width: 24px; text-align: center; }

.nav-item .ni-badge {
  margin-left: auto;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
  background: var(--accent-muted);
  color: var(--accent);
}

.sidebar-footer {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.theme-btn {
  padding: 8px 12px;
  border-radius: var(--radius-xs);
  background: var(--bg-surface);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 0.82rem;
  font-weight: 500;
  transition: all 0.2s;
  flex: 1;
}

.theme-btn:hover { border-color: var(--accent-border); color: var(--text-primary); }

.logout-btn {
  padding: 8px 12px;
  border-radius: var(--radius-xs);
  background: var(--red-muted);
  border: 1px solid transparent;
  color: var(--red);
  font-size: 0.82rem;
  font-weight: 500;
  transition: all 0.2s;
}

.logout-btn:hover { border-color: var(--red); }

/* MAIN CONTENT */
.content {
  margin-left: 260px;
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.topbar {
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-raised);
  position: sticky;
  top: 0;
  z-index: 40;
}

.topbar-title { font-weight: 700; font-size: 1.05rem; }

.topbar-clock {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  color: var(--text-muted);
}

.page {
  padding: 28px 32px;
  flex: 1;
  max-width: 1100px;
  width: 100%;
  margin: 0 auto;
}

.menu-toggle {
  display: none;
  padding: 8px;
  background: none;
  border: none;
  color: var(--text-primary);
  font-size: 1.4rem;
}

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .content { margin-left: 0; }
  .menu-toggle { display: block; }
  .page { padding: 20px 16px; }
}

/* =============================================
   ANIMATIONS
   ============================================= */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: none; }
}

.anim { animation: fadeUp 0.45s var(--ease) both; }
.anim-d1 { animation-delay: 0.05s; }
.anim-d2 { animation-delay: 0.1s; }
.anim-d3 { animation-delay: 0.15s; }

/* =============================================
   DASHBOARD
   ============================================= */
.dash-hero {
  text-align: center;
  padding: 48px 20px 36px;
}

.dash-hero h2 {
  font-family: 'Newsreader', serif;
  font-size: 2.2rem;
  font-weight: 800;
}

.dash-hero p {
  color: var(--text-secondary);
  margin-top: 6px;
  font-size: 1rem;
}

.dash-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 14px;
  margin-top: 8px;
}

.dash-card {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s var(--ease);
}

.dash-card:hover {
  border-color: var(--accent-border);
  transform: translateY(-3px);
  box-shadow: var(--shadow);
}

.dash-card .dc-icon { font-size: 2.2rem; margin-bottom: 10px; }
.dash-card .dc-name { font-weight: 700; font-size: 0.95rem; }
.dash-card .dc-sub { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }

/* =============================================
   QUICK STATS
   ============================================= */
.quick-stats {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}

.qs-card {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  text-align: center;
}

.qs-val {
  font-family: 'Newsreader', serif;
  font-size: 1.9rem;
  font-weight: 800;
  color: var(--accent);
}

.qs-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 2px;
}

/* =============================================
   PANELS
   ============================================= */
.panels-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

@media (max-width: 768px) {
  .panels-grid { grid-template-columns: 1fr; }
}

.panel {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.panel-full { grid-column: 1 / -1; }

.panel-head {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-weight: 600;
  font-size: 0.9rem;
}

.panel-body { padding: 18px; }

/* =============================================
   NOTES
   ============================================= */
.notes-textarea {
  width: 100%;
  min-height: 180px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.83rem;
  line-height: 1.75;
  resize: vertical;
  transition: border-color 0.2s;
}

.notes-textarea:focus { outline: none; border-color: var(--accent); }
.notes-textarea::placeholder { color: var(--text-muted); }

.save-indicator {
  font-size: 0.72rem;
  color: var(--green);
  margin-top: 6px;
  opacity: 0;
  transition: opacity 0.3s;
}

.save-indicator.show { opacity: 1; }

/* =============================================
   TODOS
   ============================================= */
.todo-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.todo-inp {
  flex: 1;
  padding: 10px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 0.88rem;
}

.todo-inp:focus { outline: none; border-color: var(--accent); }

.todo-btn {
  padding: 10px 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-weight: 700;
  font-size: 1rem;
}

.todo-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
}

.todo-item:last-child { border: none; }

.t-check {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--text-muted);
  background: none;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.t-check.done { background: var(--green); border-color: var(--green); }
.t-check.done::after { content: '✓'; color: #fff; font-size: 0.65rem; font-weight: 700; }

.t-text { flex: 1; font-size: 0.88rem; }
.t-text.done { text-decoration: line-through; color: var(--text-muted); }

.t-del {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1.1rem;
  padding: 4px;
}

.t-del:hover { color: var(--red); }

.t-progress { margin-top: 10px; }

.t-bar {
  height: 4px;
  background: var(--bg-overlay);
  border-radius: 2px;
  overflow: hidden;
}

.t-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  border-radius: 2px;
  transition: width 0.4s;
}

.t-pct {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 4px;
  text-align: right;
}

/* =============================================
   RESOURCES
   ============================================= */
.res-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.res-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg-surface);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-size: 0.85rem;
  transition: border-color 0.2s;
}

.res-item:hover { border-color: var(--accent-border); }

.res-tag {
  font-size: 0.65rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.tag-book { background: var(--accent-muted); color: var(--accent); }
.tag-slides { background: var(--green-muted); color: var(--green); }
.tag-lab { background: var(--amber-muted); color: var(--amber); }
.tag-exam { background: var(--red-muted); color: var(--red); }

/* =============================================
   AI CHAT
   ============================================= */
.chat-container {
  display: flex;
  flex-direction: column;
  height: 420px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.chat-msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 0.87rem;
  line-height: 1.6;
  word-wrap: break-word;
}

.chat-msg.user {
  align-self: flex-end;
  background: var(--accent);
  color: #fff;
  border-bottom-right-radius: 2px;
}

.chat-msg.ai {
  align-self: flex-start;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 2px;
}

.typing-dots { display: inline-flex; gap: 4px; }

.typing-dots span {
  width: 6px;
  height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: blink 1.2s infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0.3; }
  40% { opacity: 1; }
}

.chat-input-row {
  display: flex;
  gap: 8px;
  padding: 12px;
  border-top: 1px solid var(--border);
  background: var(--bg-raised);
}

.chat-input {
  flex: 1;
  padding: 10px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 0.88rem;
}

.chat-input:focus { outline: none; border-color: var(--accent); }

.chat-send {
  padding: 10px 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 0.88rem;
  transition: background 0.2s;
}

.chat-send:hover { background: var(--accent-hover); }
.chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

/* =============================================
   SUMMARY / PRESENTATION GENERATOR
   ============================================= */
.summary-upload-zone {
  border: 2px dashed var(--border-hover);
  border-radius: var(--radius);
  padding: 28px;
  text-align: center;
  transition: all 0.3s var(--ease);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.summary-upload-zone:hover,
.summary-upload-zone.dragover {
  border-color: var(--accent);
  background: var(--accent-muted);
}

.summary-upload-zone .su-icon { font-size: 2.2rem; margin-bottom: 8px; }
.summary-upload-zone .su-text { color: var(--text-secondary); font-size: 0.9rem; }
.summary-upload-zone .su-hint { color: var(--text-muted); font-size: 0.75rem; margin-top: 6px; }
.summary-upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

.summary-file-info {
  display: none;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
  padding: 10px 14px;
  background: var(--accent-muted);
  border: 1px solid var(--accent-border);
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
}

.summary-file-info.visible { display: flex; }
.summary-file-info .sf-name { flex: 1; font-weight: 600; color: var(--accent); }
.summary-file-info .sf-size { color: var(--text-muted); font-size: 0.78rem; }

.summary-file-info .sf-remove {
  background: none;
  border: none;
  color: var(--red);
  font-size: 1.1rem;
  cursor: pointer;
}

.summary-or {
  text-align: center;
  color: var(--text-muted);
  font-size: 0.8rem;
  margin: 12px 0;
  font-weight: 500;
}

.summary-textarea {
  width: 100%;
  min-height: 100px;
  padding: 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 0.88rem;
  line-height: 1.6;
  resize: vertical;
}

.summary-textarea:focus { outline: none; border-color: var(--accent); }

.summary-actions {
  display: flex;
  gap: 10px;
  margin-top: 12px;
  align-items: center;
  flex-wrap: wrap;
}

.summary-gen-btn {
  padding: 12px 28px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 0.9rem;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.summary-gen-btn:hover { background: var(--accent-hover); }
.summary-gen-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.summary-status { font-size: 0.8rem; color: var(--text-muted); }

/* =============================================
   PRESENTATIONS
   ============================================= */
.pres-wrapper {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}

.pres-stage {
  aspect-ratio: 16 / 9;
  background: var(--bg-base);
  position: relative;
  overflow: hidden;
}

.slide {
  width: 100%;
  height: 100%;
  padding: 5% 7%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: absolute;
  inset: 0;
  opacity: 0;
  transform: translateX(40px);
  transition: all 0.5s var(--ease);
  pointer-events: none;
  overflow-y: auto;
}

.slide.active {
  opacity: 1;
  transform: none;
  pointer-events: auto;
}

.slide-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(0.55rem, 1.2vw, 0.72rem);
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 2px;

// =============================================
// STATE MANAGEMENT
// =============================================
let state = {
  tab: 'dashboard',
  pin: null,
  apiKey: '',
  notes: {},
  todos: {},
  chatHistories: {},
  presentations: {},
  activePresIndex: {},
  links: {},
  progress: {},
  files: {},
  pomodoro: { running: false, mode: 'work', timeLeft: 1500 }
};

let presSlidePositions = {};

function loadState() {
  try {
    const raw = localStorage.getItem('ash_state_v3');
    if (raw) {
      const saved = JSON.parse(raw);
      Object.assign(state, saved);
    }
  } catch (e) {
    console.error('Failed to load state:', e);
  }
}

function saveState() {
  localStorage.setItem('ash_state_v3', JSON.stringify(state));
}

loadState();

// Get all presentations for a subject (built-in + user-generated)
function getAllPresentations(subjectKey) {
  const builtin = BUILTIN_PRESENTATIONS[subjectKey] || [];
  const userGenerated = state.presentations[subjectKey] || [];
  return [...builtin, ...userGenerated];
}

// =============================================
// AUTHENTICATION
// =============================================
function handleLock() {
  const input = document.getElementById('lockInput');
  const value = input.value.trim();
  if (!value) return;

  if (!state.pin) {
    // First time — set the PIN
    state.pin = btoa(value);
    saveState();
    unlock();
  } else {
    // Check PIN
    if (btoa(value) === state.pin) {
      unlock();
    } else {
      document.getElementById('lockError').style.display = 'block';
      input.value = '';
      input.focus();
    }
  }
}

function unlock() {
  document.getElementById('lockScreen').classList.add('hidden');
  document.getElementById('app').style.display = 'flex';
  updateThemeButton();
  renderSidebar();
  renderPage();
}

function handleLogout() {
  document.getElementById('lockScreen').classList.remove('hidden');
  document.getElementById('app').style.display = 'none';
  document.getElementById('lockInput').value = '';
  document.getElementById('lockError').style.display = 'none';
  document.getElementById('lockHint').style.display = state.pin ? 'none' : 'block';
}

document.getElementById('lockInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleLock();
});

if (state.pin) {
  document.getElementById('lockHint').style.display = 'none';
}

// =============================================
// THEME
// =============================================
const savedTheme = localStorage.getItem('ash_theme') || 'dark';
document.body.setAttribute('data-theme', savedTheme);

function toggleTheme() {
  const newTheme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.body.setAttribute('data-theme', newTheme);
  localStorage.setItem('ash_theme', newTheme);
  updateThemeButton();
}

function updateThemeButton() {
  const btn = document.getElementById('themeBtn');
  if (btn) {
    btn.textContent = document.body.getAttribute('data-theme') === 'dark' ? '🌙 Dark' : '☀️ Light';
  }
}

// =============================================
// CLOCK
// =============================================
function updateClock() {
  const now = new Date();
  const hours = String(now.getHours()).padStart(2, '0');
  const minutes = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('clock').textContent = hours + ':' + minutes;
}

setInterval(updateClock, 15000);
updateClock();

// =============================================
// UTILITIES
// =============================================
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatAIText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code style="background:var(--bg-overlay);padding:2px 6px;border-radius:3px;font-family:JetBrains Mono,monospace;font-size:.82rem;">$1</code>')
    .replace(/\n/g, '<br>');
}

// =============================================
// SIDEBAR
// =============================================
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  let html = '';

  html += '<div class="nav-section">General</div>';
  html += '<button class="nav-item ' + (state.tab === 'dashboard' ? 'active' : '') + '" onclick="navigateTo(\'dashboard\')">';
  html += '<span class="ni-icon">🏠</span> Dashboard</button>';
  html += '<div class="nav-section">Materii</div>';

  for (const [key, subject] of Object.entries(SUBJECTS)) {
    const todoCount = (state.todos[key] || []).filter(t => !t.done).length;
    const presCount = getAllPresentations(key).length;

    html += '<button class="nav-item ' + (state.tab === key ? 'active' : '') + '" onclick="navigateTo(\'' + key + '\')">';
    html += '<span class="ni-icon">' + subject.icon + '</span> ' + subject.name;
    if (todoCount) {
      html += '<span class="ni-badge">' + todoCount + '</span>';
    }
    if (presCount) {
      html += '<span class="ni-badge" style="background:var(--green-muted);color:var(--green)">' + presCount + '📊</span>';
    }
    html += '</button>';
  }

  nav.innerHTML = html;
}

function navigateTo(tab) {
  state.tab = tab;
  presSlidePositions = {};
  renderSidebar();
  renderPage();
  document.getElementById('sidebar').classList.remove('open');
}

// =============================================
// PAGE ROUTER
// =============================================
function renderPage() {
  const page = document.getElementById('pageContent');
  const title = document.getElementById('topbarTitle');

  if (state.tab === 'dashboard') {
    title.textContent = 'Dashboard';
    renderDashboard(page);
  } else {
    const subject = SUBJECTS[state.tab];
    title.textContent = subject.name + ' — ' + subject.full;
    renderSubjectPage(page, state.tab, subject);
  }
}

// DASHBOARD

  html += '<p style="font-size:.82rem;color:var(--text-secondary);margin-top:10px;">Pentru AI Tutor și generarea de prezentări ai nevoie de un API key de la <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:var(--accent);">console.anthropic.com</a>. Key-ul se salvează doar local pe dispozitivul tău.</p>';

  html += '<div class="api-status" id="apiStatus"></div></details>';

  // Subject Cards
  html += '<div class="dash-grid anim anim-d3">';
  for (const [key, subject] of Object.entries(SUBJECTS)) {
    const todos = state.todos[key] || [];
    const done = todos.filter(t => t.done).length;

  element.innerHTML = html;
}

function saveApiKey() {
  const input = document.getElementById('apiKeyInput');
  const statusEl = document.getElementById('apiStatus');
  state.apiKey = input.value.trim();
  saveState();

  if (state.apiKey) {
    statusEl.className = 'api-status ok';
    statusEl.textContent = '✅ API key salvat local. Funcțiile AI sunt active.';
  } else {
    statusEl.className = 'api-status err';
    statusEl.textContent = '⚠️ API key șters. Funcțiile AI nu vor funcționa.';
  }
}

function renderPresentation(presentation, presId) {
  var slides = presentation.slides;
  var html = '<div class="pres-wrapper" id="' + presId + '_wrapper">';

  // Stage
  html += '<div class="pres-stage" id="' + presId + '_stage">';
  slides.forEach(function(slide, index) {
    html += '<div class="slide ' + (index === 0 ? 'active' : '') + '" data-pres="' + presId + '" data-slide="' + index + '">';
    html += '<div class="slide-tag">' + (slide.tag || ('Slide ' + (index + 1))) + '</div>';
    html += '<h2>' + slide.title + '</h2>';
    html += slide.content;
    html += '</div>';
  });
  html += '</div>';

  // Controls
  html += '<div class="pres-controls">';
  html += '<button class="p-btn" id="' + presId + '_prev" onclick="presNavigate(\'' + presId + '\', -1)">← Prev</button>';
  html += '<div style="display:flex;flex-direction:column;align-items:center;gap:5px;">';
  html += '<div class="p-dots" id="' + presId + '_dots">';
  slides.forEach(function(_, index) {
    html += '<button class="p-dot ' + (index === 0 ? 'active' : '') + '" onclick="goToSlide(\'' + presId + '\', ' + index + ')"></button>';
  });
  html += '</div>';
  html += '<span class="p-counter" id="' + presId + '_counter">1 / ' + slides.length + '</span>';
  html += '</div>';
  html += '<button class="p-btn" id="' + presId + '_next" onclick="presNavigate(\'' + presId + '\', 1)">Next →</button>';
  html += '</div></div>';

  return html;
}

function setupPresentationNav(presId, presentation) {
  if (!presentation) return;
  presSlidePositions[presId] = 0;
  updatePresentationUI(presId, presentation);

  document.onkeydown = function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    var currentPresId = 'pres_' + state.tab;
    if (e.key === 'ArrowRight') presNavigate(currentPresId, 1);
    if (e.key === 'ArrowLeft') presNavigate(currentPresId, -1);
  };
}

function presNavigate(presId, direction) {
  var key = state.tab;
  var allPres = getAllPresentations(key);
  var activeIdx = state.activePresIndex[key] || 0;
  var presentation = allPres[activeIdx];
  if (!presentation) return;

  var currentSlide = presSlidePositions[presId] || 0;
  var newSlide = currentSlide + direction;
  if (newSlide < 0 || newSlide >= presentation.slides.length) return;

  presSlidePositions[presId] = newSlide;
  updatePresentationUI(presId, presentation);
}

function goToSlide(presId, index) {
  presSlidePositions[presId] = index;
  var key = state.tab;
  var allPres = getAllPresentations(key);
  var activeIdx = state.activePresIndex[key] || 0;
  updatePresentationUI(presId, allPres[activeIdx]);
}

function updatePresentationUI(presId, presentation) {
  if (!presentation) return;
  var currentSlide = presSlidePositions[presId] || 0;

  // Update slides
  var slides = document.querySelectorAll('[data-pres="' + presId + '"]');
  slides.forEach(function(slide, index) {
    slide.classList.toggle('active', index === currentSlide);
    if (index < currentSlide) {
      slide.style.transform = 'translateX(-40px)';
    } else if (index > currentSlide) {
      slide.style.transform = 'translateX(40px)';
    } else {
      slide.style.transform = 'none';
    }
  });

  // Update dots
  var dotsContainer = document.getElementById(presId + '_dots');
  if (dotsContainer) {
    dotsContainer.querySelectorAll('.p-dot').forEach(function(dot, index) {
      dot.classList.toggle('active', index === currentSlide);
    });
  }

  // Update counter
  var counter = document.getElementById(presId + '_counter');
  if (counter) counter.textContent = (currentSlide + 1) + ' / ' + presentation.slides.length;

  // Update buttons
  var prevBtn = document.getElementById(presId + '_prev');
  var nextBtn = document.getElementById(presId + '_next');
  if (prevBtn) prevBtn.disabled = currentSlide === 0;
  if (nextBtn) nextBtn.disabled = currentSlide >= presentation.slides.length - 1;
}

function switchPresentation(key, index) {
  state.activePresIndex[key] = index;
  presSlidePositions = {};
  renderPage();
}

function deletePresentation(key, id) {
  if (!confirm('Sigur vrei să ștergi această prezentare?')) return;

  state.presentations[key] = (state.presentations[key] || []).filter(function(p) {
    return p.id !== id;
  });

  if ((state.activePresIndex[key] || 0) > 0) {
    state.activePresIndex[key]--;
  }

  saveState();
  renderPage();
  renderSidebar();
}

function renderTodos(key) {
  var items = state.todos[key] || [];
  if (!items.length) {
    return '<div style="text-align:center;color:var(--text-muted);padding:16px;font-size:.88rem;">Niciun task încă</div>';
  }

  var done = items.filter(function(item) { return item.done; }).length;
  var percent = Math.round(done / items.length * 100);

  var html = '';
  items.forEach(function(item, index) {
    html += '<div class="todo-item">';
    html += '<button class="t-check ' + (item.done ? 'done' : '') + '" onclick="toggleTodo(\'' + key + '\',' + index + ')"></button>';
    html += '<span class="t-text ' + (item.done ? 'done' : '') + '">' + escapeHtml(item.text) + '</span>';
    html += '<button class="t-del" onclick="deleteTodo(\'' + key + '\',' + index + ')">×</button>';
    html += '</div>';
  });

  html += '<div class="t-progress"><div class="t-bar"><div class="t-fill" style="width:' + percent + '%"></div></div>';
  html += '<div class="t-pct">' + done + '/' + items.length + ' completate</div></div>';

  return html;
}

function addTodo(key) {
  var input = document.getElementById('todoInput');
  var text = input.value.trim();
  if (!text) return;

  if (!state.todos[key]) state.todos[key] = [];
  state.todos[key].push({ text: text, done: false });
  saveState();
  input.value = '';
  document.getElementById('todoList').innerHTML = renderTodos(key);
  renderSidebar();
}

function toggleTodo(key, index) {
  if (state.todos[key] && state.todos[key][index]) {
    state.todos[key][index].done = !state.todos[key][index].done;
    saveState();
    document.getElementById('todoList').innerHTML = renderTodos(key);
    renderSidebar();
  }
}

function deleteTodo(key, index) {
  if (state.todos[key]) {
    state.todos[key].splice(index, 1);
    saveState();
    document.getElementById('todoList').innerHTML = renderTodos(key);
    renderSidebar();
  }
}

async function sendChatMessage(key) {
  if (!state.apiKey) return;

  var input = document.getElementById('chatInput');
  var sendBtn = document.getElementById('chatSendBtn');
  var messagesContainer = document.getElementById('chatMessages');
  var text = input.value.trim();
  if (!text) return;

  // Add user message
  if (!state.chatHistories[key]) state.chatHistories[key] = [];
  state.chatHistories[key].push({ role: 'user', content: text });
  saveState();

  // Update UI
  messagesContainer.innerHTML = renderChatHistory(key);
  input.value = '';
  sendBtn.disabled = true;

  // Typing indicator
  var typingEl = document.createElement('div');
  typingEl.className = 'chat-msg ai';
  typingEl.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  messagesContainer.appendChild(typingEl);
  messagesContainer.scrollTop = messagesContainer.scrollHeight;

  try {
    // Build API messages
    var apiMessages = state.chatHistories[key]
      .filter(function(m) { return m.role === 'user' || m.role === 'assistant'; })
      .map(function(m) {
        return { role: m.role === 'user' ? 'user' : 'assistant', content: m.content };
      });

    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: SUBJECTS[key].systemPrompt,
        messages: apiMessages
      })
    });

    var data = await response.json();
    typingEl.remove();

    if (data.content && data.content[0]) {
      var aiText = data.content[0].text;
      var formatted = formatAIText(aiText);
      state.chatHistories[key].push({ role: 'assistant', content: formatted });
      saveState();
    } else if (data.error) {
      state.chatHistories[key].push({ role: 'assistant', content: '⚠️ Eroare API: ' + data.error.message });
      saveState();
    }
  } catch (err) {
    typingEl.remove();
    state.chatHistories[key].push({ role: 'assistant', content: '⚠️ Eroare de conexiune: ' + err.message });
    saveState();
  }

  messagesContainer.innerHTML = renderChatHistory(key);
  messagesContainer.scrollTop = messagesContainer.scrollHeight;
  sendBtn.disabled = false;
}

var uploadedFileText = '';

function handleFileUpload(event) {
  var file = event.target.files[0];
  if (file) processFile(file);
}

function processFile(file) {
  var maxSize = 10 * 1024 * 1024; // 10MB
  if (file.size > maxSize) {
    alert('Fișierul e prea mare (max 10MB)');
    return;
  }

  var extension = file.name.split('.').pop().toLowerCase();
  var statusEl = document.getElementById('summaryStatus');
  if (statusEl) statusEl.textContent = '⏳ Se extrage textul...';

  // Show file info
  var fileInfoEl = document.getElementById('fileInfo');
  var fileNameEl = document.getElementById('fileName');
  var fileSizeEl = document.getElementById('fileSize');
  if (fileInfoEl) fileInfoEl.classList.add('visible');
  if (fileNameEl) fileNameEl.textContent = file.name;
  if (fileSizeEl) fileSizeEl.textContent = formatFileSize(file.size);

  // Auto-fill title
  var titleInput = document.getElementById('presTitle');
  if (titleInput && !titleInput.value) {
    titleInput.value = file.name.replace(/\.[^.]+$/, '');
  }

  if (extension === 'txt' || extension === 'md' || extension === 'csv') {
    var reader = new FileReader();
    reader.onload = function(e) {
      uploadedFileText = e.target.result;
      document.getElementById('summaryInput').value = uploadedFileText.substring(0, 500) +
        (uploadedFileText.length > 500 ? '\n\n... [text complet încărcat — ' + uploadedFileText.length + ' caractere]' : '');
      if (statusEl) statusEl.textContent = '✅ ' + uploadedFileText.length + ' caractere extrase';
    };
    reader.readAsText(file);

  } else if (extension === 'pdf') {
    var reader = new FileReader();
    reader.onload = async function(e) {
      try {
        if (!window.pdfjsLib) {
          await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
          pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }
        var typedArray = new Uint8Array(e.target.result);
        var pdf = await pdfjsLib.getDocument(typedArray).promise;
        var text = '';
        for (var i = 1; i <= pdf.numPages; i++) {
          var page = await pdf.getPage(i);
          var content = await page.getTextContent();
          text += content.items.map(function(item) { return item.str; }).join(' ') + '\n\n';
        }
        uploadedFileText = text.trim();
        document.getElementById('summaryInput').value = uploadedFileText.substring(0, 500) +
          (uploadedFileText.length > 500 ? '\n\n... [PDF complet — ' + pdf.numPages + ' pagini, ' + uploadedFileText.length + ' caractere]' : '');
        if (statusEl) statusEl.textContent = '✅ PDF: ' + pdf.numPages + ' pagini, ' + uploadedFileText.length + ' caractere';
      } catch (err) {
        if (statusEl) statusEl.textContent = '⚠️ Eroare PDF: ' + err.message;
        uploadedFileText = '';
      }
    };
    reader.readAsArrayBuffer(file);

  } else if (extension === 'docx' || extension === 'pptx') {
    var reader = new FileReader();
    reader.onload = async function(e) {
      try {
        if (!window.JSZip) {
          await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
        }
        var zip = await JSZip.loadAsync(e.target.result);
        var text = '';

        if (extension === 'docx') {
          var docXml = await zip.file('word/document.xml')?.async('text');
          if (docXml) {
            text = docXml.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
          }
        } else if (extension === 'pptx') {
          var slideFiles = Object.keys(zip.files)
            .filter(function(f) { return f.match(/ppt\/slides\/slide\d+\.xml/); })
            .sort();
          for (var sf of slideFiles) {
            var slideXml = await zip.file(sf)?.async('text');
            if (slideXml) {
              text += slideXml.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim() + '\n\n';
            }
          }
        }

        uploadedFileText = text.trim();
        document.getElementById('summaryInput').value = uploadedFileText.substring(0, 500) +
          (uploadedFileText.length > 500 ? '\n\n... [' + extension.toUpperCase() + ' complet — ' + uploadedFileText.length + ' caractere]' : '');
        if (statusEl) statusEl.textContent = '✅ ' + extension.toUpperCase() + ': ' + uploadedFileText.length + ' caractere extrase';
      } catch (err) {
        if (statusEl) statusEl.textContent = '⚠️ Eroare ' + extension + ': ' + err.message;
        uploadedFileText = '';
      }
    };
    reader.readAsArrayBuffer(file);

  } else {
    if (statusEl) statusEl.textContent = '⚠️ Format nesuportat: ' + extension;
  }
}

function removeFile() {
  uploadedFileText = '';
  var fileInfoEl = document.getElementById('fileInfo');
  if (fileInfoEl) fileInfoEl.classList.remove('visible');
  var fileInput = document.getElementById('fileUpload');
  if (fileInput) fileInput.value = '';
  document.getElementById('summaryInput').value = '';
  var statusEl = document.getElementById('summaryStatus');
  if (statusEl) statusEl.textContent = '';
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function loadScript(src) {
  return new Promise(function(resolve, reject) {
    var script = document.createElement('script');
    script.src = src;
    script.onload = resolve;
    script.onerror = reject;
    document.head.appendChild(script);
  });
}

function setupDragDrop() {
  var zone = document.getElementById('uploadZone');
  if (!zone) return;

  ['dragenter', 'dragover'].forEach(function(eventName) {
    zone.addEventListener(eventName, function(e) {
      e.preventDefault();
      zone.classList.add('dragover');
    });
  });

  ['dragleave', 'drop'].forEach(function(eventName) {
    zone.addEventListener(eventName, function(e) {
      e.preventDefault();
      zone.classList.remove('dragover');
    });
  });

  zone.addEventListener('drop', function(e) {
    var file = e.dataTransfer.files[0];
    if (file) processFile(file);
  });
}

// Try to repair truncated JSON arrays
function repairTruncatedJSON(raw) {
  // Clean markdown fences
  raw = raw.replace(/^```json?\s*/, '').replace(/\s*```$/, '').trim();

  // Try parsing as-is first
  try {
    var parsed = JSON.parse(raw);
    if (Array.isArray(parsed)) return parsed;
  } catch(e) {}

  // If truncated, try to close open strings and brackets
  var repaired = raw;

  // Count open quotes — if odd, close the last string
  var quoteCount = (repaired.match(/(?<!\\)"/g) || []).length;
  if (quoteCount % 2 !== 0) {
    repaired += '"';
  }

  // Try closing any open objects/arrays
  var attempts = [
    repaired + '}]',
    repaired + '"}]',
    repaired + '</p>"}]',
    repaired + '</div>"}]',
    repaired + '</li></ul>"}]',
    repaired + '</td></tr></tbody></table>"}]',
  ];

  for (var attempt of attempts) {
    try {
      var parsed = JSON.parse(attempt);
      if (Array.isArray(parsed) && parsed.length > 0) {
        // Remove last slide if it looks incomplete (no title or no content)
        var lastSlide = parsed[parsed.length - 1];
        if (!lastSlide.title || !lastSlide.content || lastSlide.content.length < 20) {
          parsed.pop();
        }
        if (parsed.length > 0) return parsed;
      }
    } catch(e) {}
  }

  // Last resort: find the last complete object and close the array
  var lastCompleteObj = raw.lastIndexOf('},');
  if (lastCompleteObj === -1) lastCompleteObj = raw.lastIndexOf('}');
  if (lastCompleteObj > 0) {
    var trimmed = raw.substring(0, lastCompleteObj + 1) + ']';
    try {
      var parsed = JSON.parse(trimmed);
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    } catch(e) {}
  }

  return null;
}

        messages: [{

        }]

      } catch (parseError) {
        console.log('Direct parse failed, attempting repair...');
        console.log('Raw response (first 500 chars):', cleanText.substring(0, 500));
        slides = repairTruncatedJSON(cleanText);
      }

      if (slides && slides.length > 0) {
        // Create new presentation object
        var newPresentation = {
          id: 'pres_' + Date.now(),
          title: title,
          date: new Date().toLocaleDateString('ro'),
          slides: slides
        };

        // Save to state
        if (!state.presentations[key]) state.presentations[key] = [];
        state.presentations[key].push(newPresentation);
        state.activePresIndex[key] = getAllPresentations(key).length - 1;
        saveState();

        // Reset
        uploadedFileText = '';

        if (statusEl) statusEl.textContent = '✅ Prezentare generată: ' + slides.length + ' slide-uri!';

        // Re-render page to show new presentation
        renderPage();
        renderSidebar();
        return;
      } else {
        if (statusEl) statusEl.textContent = '⚠️ Nu am reușit să parsez răspunsul AI. Încearcă din nou cu un text mai scurt.';
        console.log('Failed to parse. Raw:', cleanText);
      }
    } else if (data.error) {
      if (statusEl) statusEl.textContent = '⚠️ Eroare API: ' + data.error.message;
    }
  } catch (err) {
    if (statusEl) statusEl.textContent = '⚠️ Eroare de conexiune: ' + err.message;
  }

  btnEl.disabled = false;
  btnEl.innerHTML = '<span>✨</span> Generează Prezentare';
}

function renderLinks(key) {
  var links = state.links[key] || [];
  if (!links.length) {
    return '<div style="text-align:center;color:var(--text-muted);padding:12px;font-size:.85rem;">Niciun link adăugat</div>';
  }

  var catIcons = { colab: '🔬', drive: '📁', site: '🌐', video: '🎬', other: '🔗' };

  return links.map(function(link, index) {
    return '<div class="link-item">' +
      '<span>' + (catIcons[link.cat] || '🔗') + '</span>' +
      '<span class="link-cat">' + link.cat + '</span>' +
      '<a href="' + escapeHtml(link.url) + '" target="_blank" title="' + escapeHtml(link.url) + '">' + escapeHtml(link.name) + '</a>' +
      '<button class="link-del" onclick="deleteLink(\'' + key + '\',' + index + ')">×</button>' +
      '</div>';
  }).join('');
}

function addLink(key) {
  var nameInput = document.getElementById('linkName');
  var urlInput = document.getElementById('linkUrl');
  var catSelect = document.getElementById('linkCat');

  var name = nameInput.value.trim();
  var url = urlInput.value.trim();
  var cat = catSelect.value;

  if (!name || !url) return;

  // Auto-add https if missing
  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    url = 'https://' + url;
  }

  if (!state.links[key]) state.links[key] = [];
  state.links[key].push({ name: name, url: url, cat: cat });
  saveState();

  nameInput.value = '';
  urlInput.value = '';
  document.getElementById('linkList').innerHTML = renderLinks(key);
}

function deleteLink(key, index) {
  if (state.links[key]) {
    state.links[key].splice(index, 1);
    saveState();
    document.getElementById('linkList').innerHTML = renderLinks(key);
  }
}

// =============================================
// PROGRESS TRACKER
// =============================================
function renderProgress(key, subject) {
  var progressData = state.progress[key] || {};
  var items = subject.resources.filter(function(r) {
    return r.tag === 'slides' || r.tag === 'lab';
  });

  if (!items.length) {
    return '<div style="color:var(--text-muted);font-size:.85rem;">Nicio resursă de urmărit</div>';
  }

  // Add a total courses tracker
  var totalCourses = items.length;
  var html = '';

  items.forEach(function(item, index) {
    var itemKey = item.tag + '_' + index;
    var value = progressData[itemKey] || 0;
    var maxVal = 100;

    html += '<div class="progress-row">';
    html += '<span class="progress-label">' + (item.tag === 'slides' ? '📘' : '🔬') + ' ' + item.label.substring(0, 30) + (item.label.length > 30 ? '...' : '') + '</span>';
    html += '<div class="progress-bar-wrap" onclick="setProgress(\'' + key + '\',\'' + itemKey + '\', event)">';
    html += '<div class="progress-bar-inner" style="width:' + value + '%"></div>';
    html += '</div>';
    html += '<span class="progress-pct">' + value + '%</span>';
    html += '<div class="progress-btns">';
    html += '<button class="progress-btn" onclick="adjustProgress(\'' + key + '\',\'' + itemKey + '\',-10)">−</button>';
    html += '<button class="progress-btn" onclick="adjustProgress(\'' + key + '\',\'' + itemKey + '\',10)">+</button>';
    html += '</div>';
    html += '</div>';
  });

  return html;
}

function adjustProgress(key, itemKey, delta) {
  if (!state.progress[key]) state.progress[key] = {};
  var current = state.progress[key][itemKey] || 0;
  var newVal = Math.max(0, Math.min(100, current + delta));
  state.progress[key][itemKey] = newVal;
  saveState();

  // Re-render just the progress section
  var subject = SUBJECTS[key];
  document.getElementById('progressGrid').innerHTML = renderProgress(key, subject);
}

function setProgress(key, itemKey, event) {
  var rect = event.currentTarget.getBoundingClientRect();
  var clickX = event.clientX - rect.left;
  var percent = Math.round((clickX / rect.width) * 100);
  percent = Math.max(0, Math.min(100, Math.round(percent / 5) * 5)); // Snap to 5%

  if (!state.progress[key]) state.progress[key] = {};
  state.progress[key][itemKey] = percent;
  saveState();

  var subject = SUBJECTS[key];
  document.getElementById('progressGrid').innerHTML = renderProgress(key, subject);
}

// =============================================
// POMODORO TIMER
// =============================================
var pomoInterval = null;
var pomoTimeLeft = 1500; // 25 minutes in seconds
var pomoRunning = false;
var pomoWorkMinutes = 25;

function togglePomodoro() {
  if (pomoRunning) {
    // Pause
    clearInterval(pomoInterval);
    pomoRunning = false;
    var btn = document.getElementById('pomoStartBtn');
    if (btn) btn.innerHTML = '▶ Start';
  } else {
    // Start
    pomoRunning = true;
    var btn = document.getElementById('pomoStartBtn');
    if (btn) btn.innerHTML = '⏸ Pauză';

    pomoInterval = setInterval(function() {
      pomoTimeLeft--;

      if (pomoTimeLeft <= 0) {
        clearInterval(pomoInterval);
        pomoRunning = false;

        // Check if was work or break
        var modeEl = document.getElementById('pomoMode');
        if (modeEl && modeEl.textContent === 'Focus') {
          // Switch to break
          pomoTimeLeft = 5 * 60; // 5 min break
          modeEl.textContent = 'Pauză ☕';
          modeEl.className = 'pomo-mode break';
          // Alert
          if (Notification.permission === 'granted') {
            new Notification('🎯 Pomodoro terminat! Ia o pauză de 5 minute.');
          }
          alert('🎯 Sesiune de focus terminată! Ia o pauză de 5 minute.');
        } else {
          // Switch back to work
          pomoTimeLeft = pomoWorkMinutes * 60;
          modeEl.textContent = 'Focus';
          modeEl.className = 'pomo-mode';
          alert('☕ Pauza s-a terminat! Gata de o nouă sesiune de focus?');
        }

        var btn2 = document.getElementById('pomoStartBtn');
        if (btn2) btn2.innerHTML = '▶ Start';
        pomoRunning = false;
      }

      updatePomoDisplay();
    }, 1000);
  }
}

function resetPomodoro() {
  clearInterval(pomoInterval);
  pomoRunning = false;
  pomoTimeLeft = pomoWorkMinutes * 60;

  var btn = document.getElementById('pomoStartBtn');
  if (btn) btn.innerHTML = '▶ Start';

  var modeEl = document.getElementById('pomoMode');
  if (modeEl) {
    modeEl.textContent = 'Focus';
    modeEl.className = 'pomo-mode';
  }

  updatePomoDisplay();
}

function setPomoPreset(minutes, btnEl) {
  clearInterval(pomoInterval);
  pomoRunning = false;

  if (minutes <= 5) {
    // Break mode
    pomoTimeLeft = minutes * 60;
    var modeEl = document.getElementById('pomoMode');
    if (modeEl) {
      modeEl.textContent = 'Pauză ☕';
      modeEl.className = 'pomo-mode break';
    }
  } else {
    pomoWorkMinutes = minutes;
    pomoTimeLeft = minutes * 60;
    var modeEl = document.getElementById('pomoMode');
    if (modeEl) {
      modeEl.textContent = 'Focus';
      modeEl.className = 'pomo-mode';
    }
  }

  var btn = document.getElementById('pomoStartBtn');
  if (btn) btn.innerHTML = '▶ Start';

  // Update preset buttons
  document.querySelectorAll('.pomo-preset').forEach(function(b) { b.classList.remove('active'); });
  if (btnEl) btnEl.classList.add('active');

  updatePomoDisplay();
}

function updatePomoDisplay() {
  var minutes = Math.floor(pomoTimeLeft / 60);
  var seconds = pomoTimeLeft % 60;
  var display = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');

  var timeEl = document.getElementById('pomoTime');
  if (timeEl) timeEl.textContent = display;
}

// Request notification permission for pomodoro
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

// =============================================
// FILE ORGANIZER
// =============================================
function renderFileOrganizer(key) {
  var files = state.files[key] || [];
  if (!files.length) {
    return '<div style="text-align:center;color:var(--text-muted);padding:12px;font-size:.85rem;">Niciun fișier adăugat</div>';
  }

  var catColors = {
    curs: { bg: 'var(--accent-muted)', color: 'var(--accent)', icon: '📘' },
    seminar: { bg: 'var(--green-muted)', color: 'var(--green)', icon: '📗' },
    lab: { bg: 'var(--amber-muted)', color: 'var(--amber)', icon: '📙' },
    proiect: { bg: 'var(--red-muted)', color: 'var(--red)', icon: '📕' },
    examen: { bg: 'var(--blue-muted)', color: 'var(--blue)', icon: '📓' },
    altele: { bg: 'var(--accent-muted)', color: 'var(--text-muted)', icon: '📄' }
  };

  // Sort by category
  var sorted = files.slice().sort(function(a, b) {
    var catOrder = ['curs', 'seminar', 'lab', 'proiect', 'examen', 'altele'];
    return catOrder.indexOf(a.cat) - catOrder.indexOf(b.cat);
  });

  var html = '<div class="file-list">';
  var currentCat = '';

  sorted.forEach(function(file) {
    var cat = catColors[file.cat] || catColors.altele;

    if (file.cat !== currentCat) {
      currentCat = file.cat;
      html += '<div style="font-size:.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;padding:8px 0 4px;margin-top:8px;">' + cat.icon + ' ' + file.cat + '</div>';
    }

    // Find original index for deletion
    var origIndex = files.indexOf(file);

    html += '<div class="file-item">';
    html += '<span class="file-icon">' + cat.icon + '</span>';
    html += '<span class="file-name">' + escapeHtml(file.name) + '</span>';
    html += '<span class="file-cat-badge" style="background:' + cat.bg + ';color:' + cat.color + '">' + file.cat + '</span>';
    html += '<span class="file-date">' + file.date + '</span>';
    html += '<button class="file-del" onclick="deleteFile(\'' + key + '\',' + origIndex + ')">×</button>';
    html += '</div>';
  });

  html += '</div>';
  return html;
}

function addFile(key) {
  var nameInput = document.getElementById('fileName_input');
  var catSelect = document.getElementById('fileCat');

  var name = nameInput.value.trim();
  var cat = catSelect.value;

  if (!name) return;

  if (!state.files[key]) state.files[key] = [];
  state.files[key].push({
    name: name,
    cat: cat,
    date: new Date().toLocaleDateString('ro')
  });
  saveState();

  nameInput.value = '';
  document.getElementById('fileList').innerHTML = renderFileOrganizer(key);
}

function deleteFile(key, index) {
  if (state.files[key]) {
    state.files[key].splice(index, 1);
    saveState();
    document.getElementById('fileList').innerHTML = renderFileOrganizer(key);
  }
}
